Screens:
  ProcurementExecutionScreen:
    Properties:
      LoadingSpinnerColor: =RGBA(56, 96, 178, 1)
      OnVisible: |-
        =Set(locIsViaRequester, Not(IsBlank(gSelectedRequest.RequesterInvoiceURL)));
        Set(locOfficialInvoiceURL_PE, "")
