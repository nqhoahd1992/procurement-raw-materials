                        Items: =Filter(Procurement_User, Role.Value = "Accounting")
                        Width: =Parent.Width - 40
                      Children:
                        - EmployeeID_AH:
                            Control: ComboBoxDataField@1.5.0
                            Variant: textualColumn
                            IsLocked: true
                            Properties:
                              FieldDisplayName: ="EmployeeID"
                              FieldName: ="EmployeeID"
