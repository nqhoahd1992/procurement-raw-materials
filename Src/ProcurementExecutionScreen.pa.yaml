      - conActionBar_PE:
          Control: GroupContainer@1.5.0
          Variant: AutoLayout
          Properties:
            DropShadow: =DropShadow.None
            Fill: =RGBA(255, 255, 255, 1)
            Height: =60
            LayoutAlignItems: =LayoutAlignItems.Center
            LayoutDirection: =LayoutDirection.Horizontal
            LayoutGap: =12
            LayoutJustifyContent: =LayoutJustifyContent.SpaceBetween
            PaddingBottom: =8
            PaddingLeft: =20
            PaddingRight: =20
            PaddingTop: =8
            RadiusBottomLeft: =0
            RadiusBottomRight: =0
            RadiusTopLeft: =0
            RadiusTopRight: =0
            Width: =Parent.Width
            Y: =Parent.Height - 60
          Children:
            - btnBack_PE:
                Control: Button@0.0.45
                Properties:
                  Height: =36
                  OnSelect: =Navigate(RequestDetailScreen)
                  Text: ="← Back"
                  Width: =100
                  X: =40
                  Y: =40
            - conActionBarBtn_PE:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  AlignInContainer: =AlignInContainer.SetByContainer
                  DropShadow: =DropShadow.None
                  Height: =44
                  LayoutAlignItems: =LayoutAlignItems.Center
                  LayoutDirection: =LayoutDirection.Horizontal
                  LayoutGap: =10
                  LayoutJustifyContent: =LayoutJustifyContent.End
                  LayoutMinHeight: =16
                  LayoutMinWidth: =16
                  RadiusBottomLeft: =0
                  RadiusBottomRight: =0
                  RadiusTopLeft: =0
                  RadiusTopRight: =0
                Children:
                  - btnCancel_PE:
                      Control: Button@0.0.45
                      Properties:
                        Appearance: ='ButtonCanvas.Appearance'.Primary
                        Height: =36
                        OnSelect: =Navigate(HomeScreen)
                        Text: ="Cancel"
                        Width: =120
                        X: =40
                        Y: =40
                  - btnSubmit_PE:
                      Control: Button@0.0.45
                      Properties:
                        Height: =36
                        OnSelect: |-
                          =If(
                              rdoDecision_PE.Selected.Value = "Reject",
                              // --- REJECT ---
                              If(
                                  IsBlank(txtRejectReason_PE.Value),
                                  Notify("Please enter a rejection reason", NotificationType.Error),
                                  With(
                                      {wReq: Patch(
                                          Procurement_Requests,
                                          gSelectedRequest,
                                          {
                                              Status: {Value: "Rejected"},
                                              ProcurementExecutedBy: {Id: gCurrentEmployee.ID, Value: gCurrentEmployee.Title},
                                              ProcurementExecutedAt: Now()
                                          }
                                      )},
                                      If(
                                          IsBlank(wReq.ID),
                                          Notify("Failed to submit. Please try again.", NotificationType.Error),
                                          Patch(
                                              Procurement_ExecutionLog,
                                              Defaults(Procurement_ExecutionLog),
                                              {
                                                  Title: "Step 1 - Procurement Rejected - " & gSelectedRequest.Title,
                                                  RequestID: {Id: gSelectedRequest.ID, Value: gSelectedRequest.Title},
                                                  RequestIDText: Text(gSelectedRequest.ID),
                                                  StepNumber: 1,
                                                  StepName: {Value: "Procurement Execution"},
                                                  ExecutedBy: {Id: gCurrentEmployee.ID, Value: gCurrentEmployee.Title},
                                                  ExecutedAt: Now(),
                                                  Notes: txtRejectReason_PE.Value
                                              }
                                          );
                                          Notify("Request has been rejected.", NotificationType.Success);
                                          Navigate(HomeScreen)
                                      )
                                  )
                              ),
                              // --- PROCEED ---
                              If(
                                  IsBlank(txtSupplierSummary_PE.Value) ||
                                  (
                                      Not(
                                          (Not(locIsViaRequester) && rdoInvoiceChoice_PE.Selected.Value = "Defer Invoice") ||
                                          (locIsViaRequester && rdoInvoiceCorrect_PE.Selected.Value = "No")
                                      ) &&
                                      IsBlank(ddAccountingHandler_PE.Selected)
                                  ),
                                  Notify("Please fill in all required fields", NotificationType.Error),
                                  If(
                                      locIsViaRequester,
                                      // --- PATH C: ViaRequester (requester paid supplier directly) ---
                                      If(
                                          rdoInvoiceCorrect_PE.Selected.Value = "No",
                                          // PATH C-Deferred: invoice not correct, defer invoice submission
                                          If(
                                              Not(chk1_PE.Checked && chk2_PE.Checked && chk3_PE.Checked && chk4_PE.Checked),
                                              Notify("Please complete all checklist items", NotificationType.Error),
                                              If(
                                                  CountRows(attShadow_Remittance.Attachments) = 0,
                                                  Notify("Please attach a remittance advice document", NotificationType.Error),
                                                  Set(gPendingNewAttName, Last(attShadow_Remittance.Attachments).Name);
                                                  Set(gPendingPath, "C");
                                                  SubmitForm(formRemittance)
                                              )
                                          ),
                                          // PATH C-Direct: invoice correct, submit now
                                          If(
                                              Not(chk1_PE.Checked && chk2_PE.Checked && chk3_PE.Checked && chk4_PE.Checked && chk5_PE.Checked && chk6_PE.Checked),
                                              Notify("Please complete all checklist items", NotificationType.Error),
                                              If(
                                                  IsBlank(gSelectedRequest.RequesterInvoiceURL),
                                                  Notify("Please provide an invoice link before submitting", NotificationType.Error),
                                                  If(
                                                      Not(IsNumeric(Find("maxbiocare.sharepoint", gSelectedRequest.RequesterInvoiceURL))),
                                                      Notify("Please provide a valid SharePoint link (maxbiocare)", NotificationType.Error),
                                                      If(
                                                          !gHasInvoiceResult,
                                                          Notify("Please click 'Parse Invoice' to extract invoice data before submitting", NotificationType.Warning),
                                                          If(
                                                              IsBlank(txtInvNumValue_PE.Value) ||
                                                              IsBlank(txtInvDateValue_PE.Value) ||
                                                              IsBlank(txtSupplierNameValue_PE.Value) ||
                                                              IsBlank(txtBilledToValue_PE.Value) ||
                                                              IsBlank(txtTotalAmountValue_PE.Value) ||
                                                              IsBlank(txtCurrencyValue_PE.Value) ||
                                                              IsBlank(txtDescriptionValue_PE.Value),
                                                              Notify("Some invoice fields could not be extracted. Please fill them in manually before submitting", NotificationType.Warning),
                                                              If(
                                                                  CountRows(attShadow_Remittance.Attachments) = 0,
                                                                  Notify("Please attach a remittance advice document", NotificationType.Error),
                                                                  Set(gPendingNewAttName, Last(attShadow_Remittance.Attachments).Name);
                                                                  Set(gPendingPath, "C");
                                                                  SubmitForm(formRemittance)
                                                              )
                                                          )
                                                      )
                                                  )
                                              )
                                          )
                                      ),
                                      If(
                                          rdoInvoiceChoice_PE.Selected.Value = "Defer Invoice",
                                          // --- PATH B: Deferred (invoice arrives later) ---
                                          If(
                                              Not(chk1_PE.Checked && chk2_PE.Checked && chk3_PE.Checked && chk4_PE.Checked),
                                              Notify("Please complete all checklist items", NotificationType.Error),
                                              If(
                                                  CountRows(attShadow_Confirmation.Attachments) = 0,
                                                  Notify("Please attach an order confirmation document", NotificationType.Error),
                                                  Set(gPendingNewAttName, Last(attShadow_Confirmation.Attachments).Name);
                                                  Set(gPendingPath, "B");
                                                  SubmitForm(formConfirmation)
                                              )
                                          ),
                                          // --- PATH A: Direct (invoice on hand now) ---
                                          If(
                                              Not(chk1_PE.Checked && chk2_PE.Checked && chk3_PE.Checked && chk4_PE.Checked && chk5_PE.Checked && chk6_PE.Checked),
                                              Notify("Please complete all checklist items", NotificationType.Error),
                                              If(
                                                  IsBlank(
                                                      If(
                                                          gSelectedRequest.InvoiceType.Value = "Official Invoice",
                                                          gSelectedRequest.RequesterInvoiceURL,
                                                          locOfficialInvoiceURL_PE
                                                      )
                                                  ),
                                                  Notify("Please provide an invoice link before submitting", NotificationType.Error),
                                                  If(
                                                      Not(IsNumeric(Find("maxbiocare.sharepoint",
                                                          If(
                                                              gSelectedRequest.InvoiceType.Value = "Official Invoice",
                                                              gSelectedRequest.RequesterInvoiceURL,
                                                              locOfficialInvoiceURL_PE
                                                          )
                                                      ))),
                                                      Notify("Please provide a valid SharePoint link (maxbiocare)", NotificationType.Error),
                                                      If(
                                                          !gHasInvoiceResult,
                                                          Notify("Please click 'Parse Invoice' to extract invoice data before submitting", NotificationType.Warning),
                                                          If(
                                                              IsBlank(txtInvNumValue_PE.Value) ||
                                                              IsBlank(txtInvDateValue_PE.Value) ||
                                                              IsBlank(txtSupplierNameValue_PE.Value) ||
                                                              IsBlank(txtBilledToValue_PE.Value) ||
                                                              IsBlank(txtTotalAmountValue_PE.Value) ||
                                                              IsBlank(txtCurrencyValue_PE.Value) ||
                                                              IsBlank(txtDescriptionValue_PE.Value),
                                                              Notify("Some invoice fields could not be extracted. Please fill them in manually before submitting", NotificationType.Warning),
                                                              If(
                                                                  CountRows(attShadow_Confirmation.Attachments) = 0,
                                                                  Notify("Please attach an order confirmation document", NotificationType.Error),
                                                                  Set(gPendingNewAttName, Last(attShadow_Confirmation.Attachments).Name);
                                                                  Set(gPendingPath, "A");
                                                                  SubmitForm(formConfirmation)
                                                              )
                                                          )
                                                      )
                                                  )
                                              )
                                          )
                                      )
                                  )
                              )
                          )
                        Text: ="Submit →"
                        Width: =120
                        X: =40
                        Y: =40
