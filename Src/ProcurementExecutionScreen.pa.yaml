                        PaddingBottom: =12
                        PaddingLeft: =12
                        PaddingRight: =12
                        PaddingTop: =12
                        RadiusBottomLeft: =0
                        RadiusBottomRight: =0
                        RadiusTopLeft: =0
                        RadiusTopRight: =0
                        Width: =Parent.Width - 50
                      Children:
                        - lblSuggestedFilenameLabel_PE:
                            Control: Label@2.5.1
                            Properties:
                              Color: =RGBA(37, 99, 235, 1)
                              FontWeight: =FontWeight.Bold
                              Height: =20
                              PaddingLeft: =0
                              PaddingRight: =0
                              Size: =9
                              Text: |-
                                ="Suggested Filename" & If(gHasInvoiceResult, " (ConfidenceScore: " & gInvoiceResult.confidenceScore & ")", "")
                              Width: =Parent.Width - 24
                        - lblSuggestedFilename_PE:
                            Control: Label@2.5.1
                            Properties:
                              Color: =RGBA(37, 99, 235, 1)
                              FontWeight: =FontWeight.Bold
                              Height: =20
                              PaddingLeft: =0
                              PaddingRight: =0
                              Size: =9
                              Text: |-
                                =If(gHasInvoiceResult,
                                    With(
                                        {
                                            wName: If(IsBlank(txtInvDateValue_PE.Value), "", Substitute(txtInvDateValue_PE.Value, "-", "")) &
                                                If(IsBlank(txtSupplierNameValue_PE.Value), "", " - " & txtSupplierNameValue_PE.Value) &
                                                If(IsBlank(txtBilledToValue_PE.Value), "", " - " & txtBilledToValue_PE.Value) &
                                                If(IsBlank(txtInvNumValue_PE.Value), "", " - " & txtInvNumValue_PE.Value) &
                                                If(IsBlank(txtAttentionValue_PE.Value), "", " - " & txtAttentionValue_PE.Value) &
                                                If(IsBlank(txtDescriptionValue_PE.Value), "", " - " & txtDescriptionValue_PE.Value) &
                                                If(IsBlank(txtTotalAmountValue_PE.Value), "", " - " & txtCurrencyValue_PE.Value & " " & Text(Value(txtTotalAmountValue_PE.Value), "[$-en-US]#,##0.00")) &
                                                If(IsBlank(txtTaxAmountValue_PE.Value), "", " - GST " & txtCurrencyValue_PE.Value & " " & Text(Value(txtTaxAmountValue_PE.Value), "[$-en-US]#,##0.00"))
                                        },
                                        Substitute(Substitute(Substitute(Substitute(Substitute(Substitute(Substitute(Substitute(Substitute(Substitute(wName, "\", ""), "/", ""), ":", ""), "*", ""), "?", ""), """", ""), "<", ""), ">", ""), "#", ""), "%", "") &
                                        "." & Last(Split(gInvoiceResult.suggestedFilename, ".")).Value
                                    ),
                                    "—"
                                )
                              Width: =Parent.Width - 24
