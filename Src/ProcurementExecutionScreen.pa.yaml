            - rowFormConfirmation_PE:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  DropShadow: =DropShadow.None
                  FillPortions: =0
                  Height: =150
                  LayoutAlignItems: =LayoutAlignItems.Center
                  LayoutDirection: =LayoutDirection.Vertical
                  LayoutMinHeight: =16
                  LayoutMinWidth: =16
                  PaddingBottom: =8
                  PaddingLeft: =20
                  PaddingRight: =20
                  RadiusBottomLeft: =0
                  RadiusBottomRight: =0
                  RadiusTopLeft: =0
                  RadiusTopRight: =0
                  Visible: =rdoDecision_PE.Selected.Value = "Proceed" && Not(locIsViaRequester)
                Children:
                  - lblFormConfirmationLabel_PE_1:
                      Control: Label@2.5.1
                      Properties:
                        FontWeight: =FontWeight.Semibold
                        Height: =34
                        PaddingBottom: =15
                        Size: =11
                        Text: ="Upload Confirmation *"
                        Width: =Parent.Width - 40
                  - formConfirmation:
                      Control: Form@2.4.4
                      Variant: Classic
                      Layout: Vertical
                      Properties:
                        DataSource: =Procurement_Requests
                        Height: =100
                        Item: =gSelectedRequest
                        LayoutMinHeight: =16
                        LayoutMinWidth: =16
                        NumberOfColumns: =1
                        OnFailure: =Notify("Attachment upload failed. Please try again.", NotificationType.Error)
                        OnSuccess: |-
                          =With(
                              {
                                  wURL: gSharePointAttachmentBase & Text(gSelectedRequest.ID) & "/" & EncodeUrl(gPendingNewAttName),
                                  wOfficialInvoiceLink: If(
                                      gPendingPath = "A",
                                      If(
                                          gSelectedRequest.InvoiceType.Value = "Official Invoice",
                                          gSelectedRequest.RequesterInvoiceURL,
                                          locOfficialInvoiceURL_PE
                                      ),
                                      ""
                                  )
                              },
                              With(
                                  {wReq: Patch(
                                      Procurement_Requests,
                                      gSelectedRequest,
                                      {
                                          Status: {Value: "Goods Receipt & Acceptance"},
                                          InvoiceMode: {Value: If(gPendingPath = "B", "Deferred", "Direct")},
                                          InvoiceSubmitted: gPendingPath = "A",
                                          OrderConfirmationURL: wURL,
                                          OfficialInvoiceLink: wOfficialInvoiceLink,
                                          AccountingHandlerID: If(gPendingPath = "B", Blank(), {Id: ddAccountingHandler_PE.Selected.EmployeeID.Id, Value: ddAccountingHandler_PE.Selected.EmployeeID.Value}),
                                          ProcurementExecutedBy: {Id: gCurrentEmployee.ID, Value: gCurrentEmployee.Title},
                                          ProcurementExecutedAt: Now()
                                      }
                                  )},
                                  If(
