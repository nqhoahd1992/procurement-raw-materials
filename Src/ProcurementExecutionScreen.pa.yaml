            - rowAccountingHandler_PE:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  DropShadow: =DropShadow.None
                  LayoutDirection: =LayoutDirection.Vertical
                  LayoutGap: =4
                  LayoutMinHeight: =120
                  PaddingBottom: =8
                  PaddingLeft: =20
                  PaddingRight: =20
                  PaddingTop: =20
                  RadiusBottomLeft: =0
                  RadiusBottomRight: =0
                  RadiusTopLeft: =0
                  RadiusTopRight: =0
                  Visible: |-
                    =rdoDecision_PE.Selected.Value = "Proceed" &&
                    Not(
                        (Not(locIsViaRequester) && rdoInvoiceChoice_PE.Selected.Value = "Defer Invoice") ||
                        (locIsViaRequester && rdoInvoiceCorrect_PE.Selected.Value = "No")
                    )
                  Width: =Parent.Width
                Children:
                  - lblAccountingHandlerLabel_PE:
                      Control: Label@2.5.1
                      Properties:
                        FontWeight: =FontWeight.Semibold
