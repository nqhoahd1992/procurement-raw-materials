                  - Form1:
                      Control: Form@2.4.4
                      Variant: Classic
                      Layout: Vertical
                      Properties:
                        BorderColor: =RGBA(0, 18, 107, 1)
                        DataSource: ='RM Procurement Requests'
                        Item: =gSelectedRequest
                        LayoutMinHeight: =16
                        LayoutMinWidth: =16
                        NumberOfColumns: =1
                        OnFailure: =Notify("Request saved but attachment upload failed. Please open the request and re-attach.", NotificationType.Warning); Navigate(HomeScreen)
                        OnSuccess: |-
                          =If(
                              Form1.LastSubmit.ProcurementType.Value = "Invoice Supplied" &&
                              Not(IsBlank(First(Form1.LastSubmit.Attachments).AbsoluteUri)),
                              Patch('RM Procurement Requests',
                                  {ID: Form1.LastSubmit.ID},
                                  {RequesterInvoiceURL: First(Form1.LastSubmit.Attachments).AbsoluteUri}
                              )
                          );
                          Reset(rdoHasProject);
                          Reset(ddProject_1);
                          Reset(txtDescription_1);
                          Reset(ddPurchaseAccordance_2);
                          Reset(txtEstimatedCost_1);
                          Reset(txtBudgetRef_1);
                          Reset(dpDeliveryDate_1);
                          Reset(ddManagerApprover_1);
                          Reset(rdoProcurementType_1);
                          Reset(rdoInvoiceType_1);
