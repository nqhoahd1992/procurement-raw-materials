Screens:
  RequestFormScreen:
    Properties:
      LoadingSpinnerColor: =RGBA(56, 96, 178, 1)
      OnVisible: |-
        =NewForm(Form1);
        ClearCollect(colRawMaterials, 'Raw Materials');
        Clear(colLineItems)
    Children:
      - rectHeader_2:
          Control: Rectangle@2.3.0
          Properties:
            Fill: =RGBA(83, 74, 183, 1)
            Height: =60
            Width: =Parent.Width
      - lblScreenTitle_1:
          Control: Label@2.5.1
          Properties:
            Color: =RGBA(255, 255, 255, 1)
            FontWeight: =FontWeight.Bold
            Height: =60
            Size: =14
            Text: ="Max Biocare Procurement - New Request"
            Width: =718
            X: =20
      - rowButtons:
          Control: GroupContainer@1.5.0
          Variant: AutoLayout
          Properties:
            DropShadow: =DropShadow.None
            Height: =60
            LayoutAlignItems: =LayoutAlignItems.Center
            LayoutDirection: =LayoutDirection.Horizontal
            LayoutGap: =20
            LayoutJustifyContent: =LayoutJustifyContent.SpaceBetween
            PaddingBottom: =8
            PaddingLeft: =20
            PaddingRight: =20
            PaddingTop: =8
            RadiusBottomLeft: =0
            RadiusBottomRight: =0
            RadiusTopLeft: =0
            RadiusTopRight: =0
            Width: =Parent.Width
            Y: =Parent.Height - 60
          Children:
            - btnBack_1:
                Control: Button@0.0.45
                Properties:
                  Height: =36
                  OnSelect: =Navigate(HomeScreen)
                  Text: ="← Back"
                  Width: =100
                  X: =Parent.Width - 120
                  Y: =40
            - rowButtonsWrap:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  AlignInContainer: =AlignInContainer.SetByContainer
                  DropShadow: =DropShadow.None
                  LayoutAlignItems: =LayoutAlignItems.Center
                  LayoutDirection: =LayoutDirection.Horizontal
                  LayoutGap: =10
                  LayoutJustifyContent: =LayoutJustifyContent.End
                  LayoutMinHeight: =16
                  LayoutMinWidth: =16
                  RadiusBottomLeft: =0
                  RadiusBottomRight: =0
                  RadiusTopLeft: =0
                  RadiusTopRight: =0
                Children:
                  - btnCancel_1:
                      Control: Button@0.0.45
                      Properties:
                        Height: =36
                        OnSelect: |-
                          =Reset(rdoHasProject);
                          Reset(ddProject_1);
                          Reset(txtDescription_1);
                          Reset(ddPurchaseAccordance_2);
                          Reset(txtEstimatedCost_1);
                          Reset(txtBudgetRef_1);
                          Reset(dpDeliveryDate_1);
                          Reset(ddManagerApprover_1);
                          Reset(rdoProcurementType_1);
                          Reset(rdoInvoiceType_1);
                          Set(gPendingAttachments, Blank());
                          NewForm(Form1);
                          Navigate(HomeScreen)
                        Text: ="Cancel"
                        Width: =160
                        X: =40
                        Y: =40
                  - btnSubmit_1:
                      Control: Button@0.0.45
                      Properties:
                        Height: =36
                        OnSelect: |-
                          =If(
                              rdoHasProject.Selected.Value = "Yes" && IsBlank(ddProject_1.Selected),
                              Notify("Please select the Project this request is for", NotificationType.Error),
                              If(
                              IsBlank(txtDescription_1.Value) ||
                              IsBlank(dpDeliveryDate_1.SelectedDate) ||
                              IsBlank(rdoProcurementType_1.Selected),
                              Notify("Please fill in all required fields", NotificationType.Error),
                              If(
                                  IsBlank(ddPurchaseAccordance_2.Selected),
                                  Notify("Please fill in all required fields", NotificationType.Error),
                                  If(
                                      IsBlank(txtEstimatedCost_1.Value) || Not(IsNumeric(txtEstimatedCost_1.Value)),
                                      Notify("Estimated Cost is required and must be a number", NotificationType.Error),
                                      If(
                                              rdoProcurementType_1.Selected.Value = "Invoice Supplied" &&
                                              IsBlank(rdoInvoiceType_1.Selected),
                                              Notify("Please select an invoice type", NotificationType.Error),
                                              If(
                                                  rdoProcurementType_1.Selected.Value = "Invoice Supplied" &&
                                                  CountRows(DataCardValue15.Attachments) = 0,
                                                  Notify("Please attach the invoice file before submitting", NotificationType.Error),
                                                  If(
                                                      IsBlank(ddManagerApprover_1.Selected),
                                                      Notify("Please select a Manager Approver", NotificationType.Error),
                                                      If(
                                                      CountRows(colLineItems) = 0,
                                                      Notify("Please add at least one raw material", NotificationType.Error),
                                                      If(
                                                      CountRows(Filter(colLineItems, MaterialID = 0)) > 0,
                                                      Notify("Please select a material for all rows", NotificationType.Error),
                                                      If(
                                                      CountRows(Filter(colLineItems, IsBlank(Unit))) > 0,
                                                      Notify("Please select a unit for all rows", NotificationType.Error),
                                                      If(
                                                      CountRows(Filter(colLineItems, IsBlank(Quantity) || Quantity <= 0)) > 0,
                                                      Notify("Please enter a valid quantity for all rows", NotificationType.Error),
                                                      With(
                                                          {
                                                              wNewRequest: Patch(
                                                                  'RM Procurement Requests',
                                                                  Defaults('RM Procurement Requests'),
                                                                  {
                                                                      Title: gCurrentEmployee.Title & " - " & Text(Today(), "dd/mm/yyyy"),
                                                                      RequesterID: {Id: gCurrentEmployee.ID, Value: gCurrentEmployee.Title},
                                                                      RequesterEmail: User().Email,
                                                                      ProjectID: ddProject_1.Selected.ProjectID,
                                                                      RelatedSKU: ForAll(cmbSKU.SelectedItems, {Id: ID, Value: Title}),
                                                                      ProcurementDescription: txtDescription_1.Value,
                                                                      BudgetReference: txtBudgetRef_1.Value,
                                                                      DeliveryLocation: {Value: "Port Melbourne Warehouse"},
                                                                      PurchaseAccordance: {Value: ddPurchaseAccordance_2.Selected.Value},
                                                                      CostCenter: {Value: "Port Melbourne Warehouse"},
                                                                      InvoiceRegion: {Value: "AU"},
                                                                      Currency: ddCurrency_1.Selected.Value,
                                                                      EstimatedCost: Value(txtEstimatedCost_1.Value),
                                                                      RequiredDeliveryDate: dpDeliveryDate_1.SelectedDate,
                                                                      ProcurementType: {Value: rdoProcurementType_1.Selected.Value},
                                                                      InvoiceType: If(
                                                                          rdoProcurementType_1.Selected.Value = "Invoice Supplied",
                                                                          {Value: rdoInvoiceType_1.Selected.Value},
                                                                          Blank()
                                                                      ),
                                                                      ManagerApproverID: {Id: ddManagerApprover_1.Selected.EmployeeID.Id, Value: ddManagerApprover_1.Selected.EmployeeID.Value},
                                                                      SkippedManagerReview: false,
                                                                      Status: {Value: "Pending Manager"}
                                                                  }
                                                              )
                                                          },
                                                          If(
                                                              IsBlank(wNewRequest.ID),
                                                              Notify("Failed to submit request. Please try again.", NotificationType.Error),
                                                              Set(gPendingAttachments, DataCardValue15.Attachments);
                                                              Set(gSelectedRequest, wNewRequest);
                                                              ForAll(
                                                                  colLineItems,
                                                                  Patch(
                                                                      'RM Procurement Line Items',
                                                                      Defaults('RM Procurement Line Items'),
                                                                      {
                                                                          RequestID: {Id: wNewRequest.ID, Value: wNewRequest.Title},
                                                                          RequestIDText: Text(wNewRequest.ID),
                                                                          MaterialID: {Id: MaterialID, Value: MaterialName},
                                                                          MaterialName: MaterialName,
                                                                          Unit: Unit,
                                                                          Quantity: Quantity
                                                                      }
                                                                  )
                                                              );
                                                              EditForm(Form1);
                                                              SubmitForm(Form1);
                                                              Clear(colLineItems);
                                                          )
                                                      )
                                                      )
                                                      )
                                                      )
                                                      )
                                                  )
                                              )
                                          )
                                      )
                                  )
                              )
                          )
                        Text: ="Submit Request →"
                        Width: =200
                        X: =40
                        Y: =40
      - containerScroll:
