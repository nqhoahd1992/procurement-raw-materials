Screens:
  InvoiceSubmissionScreen:
    Properties:
      LoadingSpinnerColor: =RGBA(56, 96, 178, 1)
      OnVisible: |-
        =Set(locSFUStep2Pending,
            Not(IsBlank(LookUp('RM Procurement Execution Log', RequestIDText = Text(gSelectedRequest.ID) && StepNumber = 4))) &&
            IsBlank(LookUp('RM Procurement Execution Log', RequestIDText = Text(gSelectedRequest.ID) && StepNumber = 5))
        );
        Set(gHasInvoiceResult, false);
        Set(gInvoiceResult, Blank());
        Set(gParsingInvoice, false);
        Set(locInvoiceVerified, Blank());
        Set(locOfficialInvoiceURL_ISS, "");
        Set(gPendingInvName_ISS, "");
        Set(gSelectedRequest, LookUp('RM Procurement Requests', ID = gSelectedRequest.ID))
    Children:
      - rectHeader_ISS:
          Control: Rectangle@2.3.0
          Properties:
            Fill: =RGBA(83, 74, 183, 1)
            Height: =60
            Width: =Parent.Width
      - lblScreenTitle_ISS:
          Control: Label@2.5.1
          Properties:
            Color: =RGBA(255, 255, 255, 1)
            FontWeight: =FontWeight.Bold
            Height: =60
            Size: =14
            Text: ="Max Biocare Procurement - Invoice Submission"
            Width: =654
            X: =20
      - lblUserInfo_ISS:
          Control: Label@2.5.1
          Properties:
            Align: =Align.Right
            Color: =RGBA(255, 255, 255, 1)
            FontWeight: =FontWeight.Semibold
            Height: =60
            Size: =12
            Text: |-
              =If(
                  IsBlank(gCurrentUser.Role.Value),
                  gCurrentEmployee.Title,
                  gCurrentEmployee.Title & " | " & gCurrentUser.Role.Value
              )
            Width: =280
            X: =Parent.Width - 300
      - rowInfoBlock_ISS:
          Control: GroupContainer@1.5.0
          Variant: AutoLayout
          Properties:
            DropShadow: =DropShadow.None
            Fill: =RGBA(245, 245, 250, 1)
            Height: =If(gSelectedRequest.Status.Value <> "Pending Invoice", 212, 180)
            LayoutDirection: =LayoutDirection.Vertical
            LayoutGap: =4
            PaddingBottom: =12
            PaddingLeft: =20
            PaddingRight: =20
            PaddingTop: =12
            RadiusBottomLeft: =0
            RadiusBottomRight: =0
            RadiusTopLeft: =0
            RadiusTopRight: =0
            Width: =Parent.Width
            Y: =60
          Children:
            - rowInfoLine1_ISS:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  DropShadow: =DropShadow.None
                  FillPortions: =0
                  Height: =34
                  LayoutAlignItems: =LayoutAlignItems.Center
                  LayoutDirection: =LayoutDirection.Horizontal
                  LayoutGap: =16
                  LayoutJustifyContent: =LayoutJustifyContent.SpaceBetween
                  LayoutMinHeight: =24
                  RadiusBottomLeft: =0
                  RadiusBottomRight: =0
                  RadiusTopLeft: =0
                  RadiusTopRight: =0
                  Width: =Parent.Width - 40
                Children:
                  - lblInfoTitle_ISS:
                      Control: Label@2.5.1
                      Properties:
                        FillPortions: =1
                        FontWeight: =FontWeight.Bold
                        Height: =24
                        PaddingLeft: =0
                        PaddingRight: =0
                        Size: =14
                        Text: =gSelectedRequest.Title
                        Width: =600
                  - lblStatusBadge_ISS:
                      Control: Label@2.5.1
                      Properties:
                        Align: =Align.Center
                        BorderColor: |-
                          =Switch(gSelectedRequest.Status.Value,
                              "Completed", RGBA(15, 110, 86, 1),
                              "Rejected", RGBA(163, 45, 45, 1),
                              "Goods Receipt & Acceptance", RGBA(83, 74, 183, 1),
                              RGBA(133, 79, 11, 1)
                          )
                        BorderThickness: =1
                        Color: |-
                          =Switch(gSelectedRequest.Status.Value,
                              "Completed", RGBA(15, 110, 86, 1),
                              "Rejected", RGBA(163, 45, 45, 1),
                              "Goods Receipt & Acceptance", RGBA(83, 74, 183, 1),
                              RGBA(133, 79, 11, 1)
                          )
                        Fill: |-
                          =Switch(gSelectedRequest.Status.Value,
                              "Completed", RGBA(225, 245, 238, 1),
                              "Rejected", RGBA(252, 235, 235, 1),
                              "Goods Receipt & Acceptance", RGBA(225, 220, 252, 1),
                              RGBA(250, 238, 218, 1)
                          )
                        FontWeight: =FontWeight.Semibold
                        Height: =32
                        PaddingLeft: =8
                        PaddingRight: =8
                        Size: =10
                        Text: =gSelectedRequest.Status.Value
                        Width: =220
            - lblDeferredNote_ISS:
                Control: Label@2.5.1
                Properties:
                  Color: =RGBA(30, 80, 150, 1)
                  Height: =28
                  PaddingLeft: =0
                  PaddingRight: =0
                  Size: =10
                  Text: |-
                    ="Note: The request is currently in " & gSelectedRequest.Status.Value & " phase. Submitting here completes the invoice step — the request will stay in its current stage."
                  Visible: =gSelectedRequest.Status.Value <> "Pending Invoice"
                  Width: =Parent.Width - 40
            - rowInfoLine2_ISS:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  DropShadow: =DropShadow.None
                  LayoutAlignItems: =LayoutAlignItems.Center
                  LayoutDirection: =LayoutDirection.Horizontal
                  LayoutGap: =24
                  LayoutMinHeight: =44
                  RadiusBottomLeft: =0
                  RadiusBottomRight: =0
                  RadiusTopLeft: =0
                  RadiusTopRight: =0
                  Width: =Parent.Width - 40
                Children:
                  - colRequester_ISS:
                      Control: GroupContainer@1.5.0
                      Variant: AutoLayout
                      Properties:
                        DropShadow: =DropShadow.None
                        LayoutDirection: =LayoutDirection.Vertical
                        LayoutGap: =2
                        RadiusBottomLeft: =0
                        RadiusBottomRight: =0
                        RadiusTopLeft: =0
                        RadiusTopRight: =0
                        Width: =240
                      Children:
                        - lblInfoRequesterLabel_ISS:
                            Control: Label@2.5.1
                            Properties:
                              Color: =RGBA(136, 135, 128, 1)
                              Height: =18
                              PaddingLeft: =0
                              Size: =9
                              Text: ="Requester"
                              Width: =240
                        - lblInfoRequesterValue_ISS:
                            Control: Label@2.5.1
                            Properties:
                              FontWeight: =FontWeight.Semibold
                              Height: =20
                              PaddingLeft: =0
                              Size: =11
                              Text: =gSelectedRequest.RequesterID.Value
                              Width: =240
                  - colCost_ISS:
                      Control: GroupContainer@1.5.0
                      Variant: AutoLayout
                      Properties:
                        DropShadow: =DropShadow.None
                        LayoutDirection: =LayoutDirection.Vertical
                        LayoutGap: =2
                        RadiusBottomLeft: =0
                        RadiusBottomRight: =0
                        RadiusTopLeft: =0
                        RadiusTopRight: =0
                        Width: =240
                      Children:
                        - lblInfoCostLabel_ISS:
                            Control: Label@2.5.1
                            Properties:
                              Color: =RGBA(136, 135, 128, 1)
                              Height: =18
                              PaddingLeft: =0
                              Size: =9
                              Text: ="Estimated Cost"
                              Width: =240
                        - lblInfoCostValue_ISS:
                            Control: Label@2.5.1
                            Properties:
                              FontWeight: =FontWeight.Semibold
                              Height: =20
                              PaddingLeft: =0
                              Size: =11
                              Text: =gSelectedRequest.Currency & " " & Text(gSelectedRequest.EstimatedCost, "#,###")
                              Width: =240
            - rowInfoLine3_ISS:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  DropShadow: =DropShadow.None
                  LayoutAlignItems: =LayoutAlignItems.Center
                  LayoutDirection: =LayoutDirection.Horizontal
                  LayoutGap: =24
                  LayoutMinHeight: =44
                  RadiusBottomLeft: =0
                  RadiusBottomRight: =0
                  RadiusTopLeft: =0
                  RadiusTopRight: =0
                  Width: =Parent.Width - 40
                Children:
                  - colInvoiceMode_ISS:
                      Control: GroupContainer@1.5.0
                      Variant: AutoLayout
                      Properties:
                        DropShadow: =DropShadow.None
                        LayoutDirection: =LayoutDirection.Vertical
                        LayoutGap: =2
                        RadiusBottomLeft: =0
                        RadiusBottomRight: =0
                        RadiusTopLeft: =0
                        RadiusTopRight: =0
                        Width: =240
                      Children:
                        - lblInfoInvoiceModeLabel_ISS:
                            Control: Label@2.5.1
                            Properties:
                              Color: =RGBA(136, 135, 128, 1)
                              Height: =18
                              PaddingLeft: =0
                              Size: =9
                              Text: ="Invoice Path"
                              Width: =240
                        - lblInfoInvoiceModeValue_ISS:
                            Control: Label@2.5.1
                            Properties:
                              FontWeight: =FontWeight.Semibold
                              Height: =20
                              PaddingLeft: =0
                              Size: =11
                              Text: =gSelectedRequest.InvoiceMode.Value
                              Width: =240
      - conScrollable_ISS:
          Control: GroupContainer@1.5.0
          Variant: AutoLayout
          Properties:
            DropShadow: =DropShadow.None
            Height: =If(gSelectedRequest.Status.Value <> "Pending Invoice", Parent.Height - 332, Parent.Height - 300)
            LayoutDirection: =LayoutDirection.Vertical
            LayoutOverflowY: =LayoutOverflow.Scroll
            RadiusBottomLeft: =0
            RadiusBottomRight: =0
            RadiusTopLeft: =0
            RadiusTopRight: =0
            Width: =Parent.Width
            Y: =If(gSelectedRequest.Status.Value <> "Pending Invoice", 272, 240)
          Children:
            - rowWaitingForRequester_ISS:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  DropShadow: =DropShadow.None
                  Fill: =RGBA(250, 238, 218, 1)
                  FillPortions: =0
                  Height: =140
                  LayoutDirection: =LayoutDirection.Vertical
                  LayoutGap: =8
                  PaddingBottom: =16
                  PaddingLeft: =20
                  PaddingRight: =20
                  PaddingTop: =16
                  RadiusBottomLeft: =0
                  RadiusBottomRight: =0
                  RadiusTopLeft: =0
                  RadiusTopRight: =0
                  Visible: =gSelectedRequest.InvoiceMode.Value = "ViaRequester" && IsBlank(gSelectedRequest.RequesterInvoiceURL)
                  Width: =Parent.Width
                Children:
                  - lblWaitingMsg_ISS:
                      Control: Label@2.5.1
                      Properties:
                        Color: =RGBA(133, 79, 11, 1)
                        FontWeight: =FontWeight.Semibold
                        Height: =24
                        Size: =12
                        Text: ="Waiting for Requester to submit the corrected supplier invoice."
                        Width: =Parent.Width - 40
                  - lblWaitingHint_ISS:
                      Control: Label@2.5.1
                      Properties:
                        Color: =RGBA(133, 79, 11, 1)
                        Height: =20
                        Size: =10
                        Text: ="Invoice processing is locked until the Requester provides the corrected file."
                        Width: =Parent.Width - 40
                  - btnRemindRequester_ISS:
                      Control: Button@0.0.45
                      Properties:
                        BasePaletteColor: =RGBA(133, 79, 11, 1)
                        Height: =36
                        OnSelect: |-
                          =Procurement_Notify_Remind_Invoice.Run(
                              gSelectedRequest.RequesterEmail,
                              gSelectedRequest.RequesterID.Value,
                              gSelectedRequest.Title,
                              Text(gSelectedRequest.ID),
                              ""
                          );
                          Notify("Reminder sent to " & gSelectedRequest.RequesterID.Value & ".", NotificationType.Success)
                        Text: ="Remind Requester"
                        Width: =180
            - rowRequesterInvoicePreview_ISS:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  DropShadow: =DropShadow.None
                  Fill: =RGBA(219, 234, 254, 1)
                  FillPortions: =0
                  Height: =80
                  LayoutDirection: =LayoutDirection.Vertical
                  LayoutGap: =4
                  PaddingBottom: =12
                  PaddingLeft: =20
                  PaddingRight: =20
                  PaddingTop: =12
                  RadiusBottomLeft: =0
                  RadiusBottomRight: =0
                  RadiusTopLeft: =0
                  RadiusTopRight: =0
                  Visible: =gSelectedRequest.InvoiceMode.Value = "ViaRequester" && Not(IsBlank(gSelectedRequest.RequesterInvoiceURL))
                  Width: =Parent.Width
                Children:
                  - lblRequesterInvoiceLabel_ISS:
                      Control: Label@2.5.1
                      Properties:
                        Color: =RGBA(37, 99, 235, 1)
                        FontWeight: =FontWeight.Bold
                        Height: =20
                        Size: =11
                        Text: ="Invoice submitted by Requester:"
                        Width: =Parent.Width - 40
                  - lblRequesterInvoiceURL_ISS:
                      Control: Label@2.5.1
                      Properties:
                        Color: =RGBA(37, 99, 235, 1)
                        FontWeight: =FontWeight.Semibold
                        Height: =24
                        OnSelect: =If(Not(IsBlank(gSelectedRequest.RequesterInvoiceURL)), Launch(gSelectedRequest.RequesterInvoiceURL, {}, LaunchTarget.New))
                        Size: =11
                        Text: =If(IsBlank(gSelectedRequest.RequesterInvoiceURL), "—", gSelectedRequest.RequesterInvoiceURL)
                        Underline: =Not(IsBlank(gSelectedRequest.RequesterInvoiceURL))
                        Width: =Parent.Width - 40
            - rowVerifyInvoice_ISS:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  DropShadow: =DropShadow.None
                  Fill: =RGBA(245, 245, 250, 1)
                  FillPortions: =0
                  Height: =110
                  LayoutDirection: =LayoutDirection.Vertical
                  LayoutGap: =12
                  PaddingBottom: =16
                  PaddingLeft: =20
                  PaddingRight: =20
                  PaddingTop: =16
                  RadiusBottomLeft: =0
                  RadiusBottomRight: =0
                  RadiusTopLeft: =0
                  RadiusTopRight: =0
                  Visible: =gSelectedRequest.InvoiceMode.Value = "ViaRequester" && Not(IsBlank(gSelectedRequest.RequesterInvoiceURL))
                  Width: =Parent.Width
                Children:
                  - lblVerifyQuestion_ISS:
                      Control: Label@2.5.1
                      Properties:
                        FontWeight: =FontWeight.Bold
                        Height: =24
                        Size: =12
                        Text: ="Is this invoice correct?"
                        Width: =Parent.Width - 40
                  - rowVerifyButtons_ISS:
                      Control: GroupContainer@1.5.0
                      Variant: AutoLayout
                      Properties:
                        DropShadow: =DropShadow.None
                        FillPortions: =0
                        Height: =36
                        LayoutAlignItems: =LayoutAlignItems.Center
                        LayoutDirection: =LayoutDirection.Horizontal
                        LayoutGap: =8
                        LayoutMinHeight: =60
                        RadiusBottomLeft: =0
                        RadiusBottomRight: =0
                        RadiusTopLeft: =0
                        RadiusTopRight: =0
                        Width: =Parent.Width - 40
                      Children:
                        - btnInvoiceCorrect_ISS:
                            Control: Button@0.0.45
                            Properties:
                              BasePaletteColor: =If(locInvoiceVerified = true, RGBA(5, 102, 178, 1), RGBA(210, 209, 199, 1))
                              Height: =36
                              OnSelect: =Set(locInvoiceVerified, true)
                              Text: ="Yes — proceed"
                              Width: =160
                        - btnInvoiceIncorrect_ISS:
                            Control: Button@0.0.45
                            Properties:
                              BasePaletteColor: =If(locInvoiceVerified = false, RGBA(163, 45, 45, 1), RGBA(210, 209, 199, 1))
                              Height: =36
                              OnSelect: =Set(locInvoiceVerified, false)
                              Text: ="No — request re-upload"
                              Width: =200
            - rowRequestReupload_ISS:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  DropShadow: =DropShadow.None
                  Fill: =RGBA(252, 235, 235, 1)
                  FillPortions: =0
                  Height: =110
                  LayoutDirection: =LayoutDirection.Vertical
                  LayoutGap: =8
                  PaddingBottom: =16
                  PaddingLeft: =20
                  PaddingRight: =20
                  PaddingTop: =16
                  RadiusBottomLeft: =0
                  RadiusBottomRight: =0
                  RadiusTopLeft: =0
                  RadiusTopRight: =0
                  Visible: =locInvoiceVerified = false
                  Width: =Parent.Width
                Children:
                  - lblReuploadMsg_ISS:
                      Control: Label@2.5.1
                      Properties:
                        Color: =RGBA(163, 45, 45, 1)
                        FontWeight: =FontWeight.Semibold
                        Height: =24
                        Size: =12
                        Text: ="Invoice rejected. Notify the Requester to upload the corrected file."
                        Width: =Parent.Width - 40
                  - btnRequestReupload_ISS:
                      Control: Button@0.0.45
                      Properties:
                        BasePaletteColor: =RGBA(163, 45, 45, 1)
                        Height: =36
                        OnSelect: |-
                          =With(
                              {wPatched: Patch('RM Procurement Requests', gSelectedRequest, {RequesterInvoiceURL: ""})},
                              If(
                                  IsBlank(wPatched.ID),
                                  Notify("Failed. Please try again.", NotificationType.Error),
                                  Procurement_Notify_Remind_Invoice.Run(
                                      gSelectedRequest.RequesterEmail,
                                      gSelectedRequest.RequesterID.Value,
                                      gSelectedRequest.Title,
                                      Text(gSelectedRequest.ID),
                                      gCurrentEmployee.Title
                                  );
                                  Set(gSelectedRequest, LookUp('RM Procurement Requests', ID = gSelectedRequest.ID));
                                  Set(locInvoiceVerified, Blank());
                                  Notify("Requester has been notified to re-upload the invoice.", NotificationType.Success)
                              )
                          )
                        Text: ="Request Re-upload"
                        Width: =180
            - rowOfficialInvoiceInput_ISS:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  DropShadow: =DropShadow.None
                  FillPortions: =0
                  Height: =210
                  LayoutDirection: =LayoutDirection.Vertical
                  LayoutGap: =4
                  LayoutMinHeight: =160
                  PaddingBottom: =8
                  PaddingLeft: =20
                  PaddingRight: =20
                  PaddingTop: =16
                  RadiusBottomLeft: =0
                  RadiusBottomRight: =0
                  RadiusTopLeft: =0
                  RadiusTopRight: =0
                  Visible: =gSelectedRequest.InvoiceMode.Value = "Deferred"
                  Width: =Parent.Width
                Children:
                  - lblOfficialInvoiceHeader_ISS:
                      Control: Label@2.5.1
                      Properties:
                        FontWeight: =FontWeight.Bold
                        Height: =24
                        Size: =12
                        Text: ="Upload Supplier Invoice *"
                        Width: =Parent.Width - 40
                  - lblOfficialInvoiceHint_ISS:
                      Control: Label@2.5.1
                      Properties:
                        Color: =RGBA(136, 135, 128, 1)
                        Size: =10
                        Text: ="Upload the invoice file received from the supplier. Then click 'Extract Invoice' to parse it."
                        Width: =Parent.Width - 40
                  - formOfficialInvoice_ISS:
                      Control: Form@2.4.4
                      Variant: Classic
                      Layout: Vertical
                      Properties:
                        DataSource: ='RM Procurement Requests'
                        Height: =120
                        Item: =gSelectedRequest
                        LayoutMinWidth: =100
                        NumberOfColumns: =1
                        OnFailure: =Notify("Upload failed. Please try again.", NotificationType.Error)
                        OnSuccess: |-
                          =Set(locOfficialInvoiceURL_ISS,
                              gSharePointAttachmentBase & Text(gSelectedRequest.ID) & "/" & EncodeUrl(gPendingInvName_ISS)
                          );
                          Set(gParsingInvoice, true);
                          Set(gHasInvoiceResult, false);
                          Set(gInvoiceResult,
                              IfError(
                                  Parse_Invoice.Run(locOfficialInvoiceURL_ISS, gSelectedRequest.ID),
                                  Blank()
                              )
                          );
                          Set(gHasInvoiceResult, true);
                          Set(gParsingInvoice, false)
                        Width: =Parent.Width - 40
                      Children:
                        - dcOfficialInvoice_ISS:
                            Control: TypedDataCard@1.0.7
                            Variant: ClassicAttachmentsEdit
                            Properties:
                              DataField: ="{Attachments}"
                              Default: =Blank()
                              DisplayMode: =DisplayMode.Edit
                              DisplayName: =""
                              Height: =100
                              Required: =false
                              Update: =attOfficialInvoice_ISS.Attachments
                              Width: =Parent.Width
                              X: =0
                              Y: =0
                            Children:
                              - attOfficialInvoice_ISS:
                                  Control: Attachments@2.3.0
                                  Properties:
                                    Height: =100
                                    Items: =Parent.Default
                                    MaxAttachments: =1
                                    Width: =Parent.Width
            - rowParseInvoice_ISS:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  AlignInContainer: =AlignInContainer.Start
                  DropShadow: =DropShadow.None
                  Fill: =RGBA(241, 239, 232, 1)
                  FillPortions: =0
                  Height: =310
                  LayoutDirection: =LayoutDirection.Vertical
                  LayoutGap: =8
                  LayoutMinHeight: =300
                  PaddingBottom: =16
                  PaddingLeft: =20
                  PaddingRight: =20
                  PaddingTop: =16
                  RadiusBottomLeft: =0
                  RadiusBottomRight: =0
                  RadiusTopLeft: =0
                  RadiusTopRight: =0
                  Visible: =gSelectedRequest.InvoiceMode.Value <> "ViaRequester" || locInvoiceVerified = true
                  Width: =Parent.Width
                Children:
                  - rowParseHeader_ISS:
                      Control: GroupContainer@1.5.0
                      Variant: AutoLayout
                      Properties:
                        AlignInContainer: =AlignInContainer.Start
                        DropShadow: =DropShadow.None
                        FillPortions: =0
                        Height: =36
                        LayoutAlignItems: =LayoutAlignItems.Center
                        LayoutDirection: =LayoutDirection.Horizontal
                        LayoutJustifyContent: =LayoutJustifyContent.SpaceBetween
                        LayoutMinHeight: =60
                        RadiusBottomLeft: =0
                        RadiusBottomRight: =0
                        RadiusTopLeft: =0
                        RadiusTopRight: =0
                        Width: =Parent.Width - 50
                      Children:
                        - lblParseInvoiceHeader_ISS:
                            Control: Label@2.5.1
                            Properties:
                              FontWeight: =FontWeight.Semibold
                              Height: =28
                              PaddingLeft: =0
                              PaddingRight: =0
                              Size: =12
                              Text: =If(gParsingInvoice, "⏳ Parsing invoice, please wait...", "Invoice Data")
                              Width: =300
                        - btnParseInvoice_ISS:
                            Control: Button@0.0.45
                            Properties:
                              DisplayMode: =If(gSelectedRequest.InvoiceMode.Value = "ViaRequester" && IsBlank(gSelectedRequest.RequesterInvoiceURL), DisplayMode.Disabled, DisplayMode.Edit)
                              Height: =36
                              OnSelect: |-
                                =If(
                                    gSelectedRequest.InvoiceMode.Value = "ViaRequester",
                                    If(
                                        IsBlank(gSelectedRequest.RequesterInvoiceURL),
                                        Notify("Please provide an invoice link before parsing.", NotificationType.Error),
                                        Set(gParsingInvoice, true);
                                        Set(gHasInvoiceResult, false);
                                        Set(gInvoiceResult,
                                            IfError(
                                                Parse_Invoice.Run(gSelectedRequest.RequesterInvoiceURL, gSelectedRequest.ID),
                                                Blank()
                                            )
                                        );
                                        Set(gHasInvoiceResult, true);
                                        Set(gParsingInvoice, false)
                                    ),
                                    If(
                                        CountRows(attOfficialInvoice_ISS.Attachments) = 0,
                                        Notify("Please attach the invoice file before extracting.", NotificationType.Error),
                                        Set(gPendingInvName_ISS, Last(attOfficialInvoice_ISS.Attachments).Name);
                                        SubmitForm(formOfficialInvoice_ISS)
                                    )
                                )
                              Text: |-
                                ="🔍 Extract Invoice"
                              Width: =160
                  - rowParseFields1_ISS:
                      Control: GroupContainer@1.5.0
                      Variant: AutoLayout
                      Properties:
                        AlignInContainer: =AlignInContainer.SetByContainer
                        DropShadow: =DropShadow.None
                        FillPortions: =0
                        Height: =70
                        LayoutDirection: =LayoutDirection.Horizontal
                        LayoutGap: =20
                        LayoutMinHeight: =70
                        RadiusBottomLeft: =0
                        RadiusBottomRight: =0
                        RadiusTopLeft: =0
                        RadiusTopRight: =0
                        Width: =Parent.Width - 50
                      Children:
                        - colInvoiceDate_ISS:
                            Control: GroupContainer@1.5.0
                            Variant: AutoLayout
                            Properties:
                              DropShadow: =DropShadow.None
                              LayoutDirection: =LayoutDirection.Vertical
                              LayoutGap: =4
                              LayoutMinHeight: =70
                              LayoutMinWidth: =60
                              RadiusBottomLeft: =0
                              RadiusBottomRight: =0
                              RadiusTopLeft: =0
                              RadiusTopRight: =0
                              Width: =200
                            Children:
                              - lblInvDateLabel_ISS:
                                  Control: Label@2.5.1
                                  Properties:
                                    Color: =RGBA(136, 135, 128, 1)
                                    Height: =20
                                    PaddingLeft: =0
                                    PaddingRight: =0
                                    Size: =9
                                    Text: ="Invoice Date *"
                                    Width: =Parent.Width
                              - txtInvDateValue_ISS:
                                  Control: TextInput@0.0.54
                                  Properties:
                                    Height: =40
                                    Placeholder: ="YYYY-MM-DD"
                                    Value: =If(gHasInvoiceResult, gInvoiceResult.invoiceDate, "")
                                    Width: =Parent.Width
                        - colSupplierName_ISS:
                            Control: GroupContainer@1.5.0
                            Variant: AutoLayout
                            Properties:
                              DropShadow: =DropShadow.None
                              LayoutDirection: =LayoutDirection.Vertical
                              LayoutGap: =4
                              LayoutMinHeight: =70
                              LayoutMinWidth: =60
                              RadiusBottomLeft: =0
                              RadiusBottomRight: =0
                              RadiusTopLeft: =0
                              RadiusTopRight: =0
                              Width: =280
                            Children:
                              - lblSupplierNameLabel_ISS:
                                  Control: Label@2.5.1
                                  Properties:
                                    Color: =RGBA(136, 135, 128, 1)
                                    Height: =20
                                    PaddingLeft: =0
                                    PaddingRight: =0
                                    Size: =9
                                    Text: ="Supplier Name *"
                                    Width: =Parent.Width
                              - txtSupplierNameValue_ISS:
                                  Control: TextInput@0.0.54
                                  Properties:
                                    Height: =40
                                    Value: =If(gHasInvoiceResult, gInvoiceResult.supplierName, "")
                                    Width: =Parent.Width
                        - colBilledTo_ISS:
                            Control: GroupContainer@1.5.0
                            Variant: AutoLayout
                            Properties:
