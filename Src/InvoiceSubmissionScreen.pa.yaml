                                                If(IsBlank(txtAttentionValue_ISS.Value), "", " - " & txtAttentionValue_ISS.Value) &
                                                If(IsBlank(txtDescriptionValue_ISS.Value), "", " - " & txtDescriptionValue_ISS.Value) &
                                                If(IsBlank(txtTotalAmountValue_ISS.Value), "", " - " & txtCurrencyValue_ISS.Value & " " & Text(Value(txtTotalAmountValue_ISS.Value), "[$-en-US]#,##0.00")) &
                                                If(IsBlank(txtTaxAmountValue_ISS.Value), "", " - GST " & txtCurrencyValue_ISS.Value & " " & Text(Value(txtTaxAmountValue_ISS.Value), "[$-en-US]#,##0.00"))
