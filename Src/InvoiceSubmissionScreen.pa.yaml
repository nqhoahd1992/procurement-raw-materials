      - conActionBar_ISS:
          Control: GroupContainer@1.5.0
          Variant: AutoLayout
          Properties:
            DropShadow: =DropShadow.None
            Fill: =RGBA(255, 255, 255, 1)
            Height: =60
            LayoutAlignItems: =LayoutAlignItems.Center
            LayoutDirection: =LayoutDirection.Horizontal
            LayoutGap: =12
            LayoutJustifyContent: =LayoutJustifyContent.SpaceBetween
            PaddingBottom: =8
            PaddingLeft: =20
            PaddingRight: =20
            PaddingTop: =8
            RadiusBottomLeft: =0
            RadiusBottomRight: =0
            RadiusTopLeft: =0
            RadiusTopRight: =0
            Width: =Parent.Width
            Y: =Parent.Height - 60
          Children:
            - btnBack_ISS:
                Control: Button@0.0.45
                Properties:
                  Height: =36
                  OnSelect: =Navigate(HomeScreen)
                  Text: ="← Back"
                  Width: =100
            - btnSubmit_ISS:
                Control: Button@0.0.45
                Properties:
                  BasePaletteColor: =RGBA(5, 102, 178, 1)
                  DisplayMode: =If(gSelectedRequest.InvoiceMode.Value = "ViaRequester" && (IsBlank(gSelectedRequest.RequesterInvoiceURL) || locInvoiceVerified <> true), DisplayMode.Disabled, DisplayMode.Edit)
                  Height: =36
                  OnSelect: |-
                    =If(
                        IsBlank(ddAccountingHandler_ISS.Selected),
                        Notify("Please assign an Accounting Staff member before submitting.", NotificationType.Error),
                        Set(locInvoiceURL_ISS,
                            If(
                                gSelectedRequest.InvoiceMode.Value = "ViaRequester",
                                gSelectedRequest.RequesterInvoiceURL,
                                locOfficialInvoiceURL_ISS
                            )
                        );
                    If(
                        IsBlank(locInvoiceURL_ISS),
                        Notify("Please provide an invoice URL.", NotificationType.Error),
                        If(
                            !gHasInvoiceResult,
                                Notify("Please click 'Extract Invoice' to extract invoice data before submitting.", NotificationType.Warning),
                                If(
                                    IsBlank(txtInvDateValue_ISS.Value) ||
                                    IsBlank(txtSupplierNameValue_ISS.Value) ||
                                    IsBlank(txtBilledToValue_ISS.Value) ||
                                    IsBlank(txtInvNumValue_ISS.Value) ||
                                    IsBlank(txtTotalAmountValue_ISS.Value) ||
                                    IsBlank(txtCurrencyValue_ISS.Value) ||
                                    IsBlank(txtDescriptionValue_ISS.Value),
                                    Notify("Some invoice fields could not be extracted. Please fill them in manually before submitting.", NotificationType.Warning),
                                    With(
                                        {wPatched: Patch(
                                            'RM Procurement Requests',
                                            gSelectedRequest,
                                            {
                                                InvoiceSubmitted: true,
                                                Status: If(
                                                    gSelectedRequest.Status.Value = "Pending Invoice",
                                                    {Value: If(locSFUStep2Pending, "Pending Supplier Follow-up", "Pending Accounting")},
                                                    gSelectedRequest.Status
                                                ),
                                                OfficialInvoiceLink: locInvoiceURL_ISS,
                                                AccountingHandlerID: {Id: ddAccountingHandler_ISS.Selected.EmployeeID.Id, Value: ddAccountingHandler_ISS.Selected.EmployeeID.Value}
                                            }
                                        )},
                                        If(
                                            IsBlank(wPatched.ID),
                                            Notify("Failed to save. Please try again.", NotificationType.Error),
                                            With(
                                                {wLog: Patch(
                                                    'RM Procurement Execution Log',
                                                    Defaults('RM Procurement Execution Log'),
                                                    {
                                                        Title: "Step 6 - Invoice Submission - " & gSelectedRequest.Title,
                                                        RequestID: {Id: gSelectedRequest.ID, Value: gSelectedRequest.Title},
                                                        RequestIDText: Text(gSelectedRequest.ID),
                                                        StepNumber: 6,
                                                        StepName: {Value: "Invoice Submission"},
                                                        ExecutedBy: {Id: gCurrentEmployee.ID, Value: gCurrentEmployee.Title},
                                                        ExecutedAt: Now(),
                                                        HandoverToID: {Id: ddAccountingHandler_ISS.Selected.EmployeeID.Id, Value: ddAccountingHandler_ISS.Selected.EmployeeID.Value},
                                                        HandoverToIDText: ddAccountingHandler_ISS.Selected.EmployeeID.Value
                                                    }
                                                )},
                                                If(
                                                    IsBlank(wLog.ID),
                                                    Notify("Saved but log write failed. Please contact IT with reference: " & gSelectedRequest.Title, NotificationType.Warning);
                                                    Navigate(HomeScreen),
                                                    Set(gSubmitInvoiceResult,
                                                        Submit_Invoice.Run(
                                                            locInvoiceURL_ISS,
                                                            gSelectedRequest.ID,
                                                            Left(lblSuggestedFilename_ISS.Text, Len(lblSuggestedFilename_ISS.Text) - Len("." & Last(Split(lblSuggestedFilename_ISS.Text, ".")).Value)),
                                                            txtInvDateValue_ISS.Value,
                                                            txtSupplierNameValue_ISS.Value,
                                                            txtBilledToValue_ISS.Value,
                                                            txtInvNumValue_ISS.Value,
                                                            Value(txtTotalAmountValue_ISS.Value),
                                                            Value(If(IsBlank(txtTaxAmountValue_ISS.Value), "0", txtTaxAmountValue_ISS.Value)),
                                                            txtCurrencyValue_ISS.Value,
                                                            gInvoiceResult.jobId,
                                                            gInvoiceResult.confidenceScore,
                                                            txtAttentionValue_ISS.Value,
                                                            txtDescriptionValue_ISS.Value,
                                                            gSelectedRequest.InvoiceRegion.Value,
                                                            txtABNValue_ISS.Value,
                                                            "Raw Materials Procurement App",
                                                            gSelectedRequest.ProjectID
                                                        )
                                                    );
                                                    If(
                                                        IsError(gSubmitInvoiceResult),
                                                        Notify("Saved but invoice processing failed. Please contact IT with reference: " & gSelectedRequest.Title, NotificationType.Warning);
                                                        Navigate(HomeScreen),
                                                        Notify(If(gSelectedRequest.Status.Value = "Pending Invoice", "Invoice submitted successfully. Request is now " & If(locSFUStep2Pending, "Pending Supplier Follow-up.", "Pending Accounting."), "Invoice submitted successfully. Goods Receipt is still in progress."), NotificationType.Success);
                                                        Navigate(HomeScreen)
                                                    )
                                                )
                                            )
                                        )
                                    )
                                )
                            )
                    )
                    )
                  Text: ="Submit Invoice →"
                  Width: =180
