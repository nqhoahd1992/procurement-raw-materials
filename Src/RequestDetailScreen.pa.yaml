Screens:
  RequestDetailScreen:
    Properties:
      LoadingSpinnerColor: =RGBA(56, 96, 178, 1)
      OnVisible: |-
        =Set(gSelectedRequest, LookUp('RM Procurement Requests', ID = gSelectedRequest.ID));
        Set(gSelectedLineItem, Blank());
        ClearCollect(colLineItemsDetail, Filter('RM Procurement Line Items', RequestIDText = Text(gSelectedRequest.ID)));
        ClearCollect(colExecutionLog, Filter('RM Procurement Execution Log', RequestIDText = Text(gSelectedRequest.ID)));
        ClearCollect(colApprovalLog, Filter('RM Procurement Approval Log', RequestIDText = Text(gSelectedRequest.ID)));
        Set(gGRHasAttachments, CountRows(LookUp('RM Procurement Execution Log', RequestIDText = Text(gSelectedRequest.ID) && StepNumber = 3).Attachments) > 0);
        Set(gSFU1HasAttachments, CountRows(LookUp('RM Procurement Execution Log', RequestIDText = Text(gSelectedRequest.ID) && StepNumber = 4).Attachments) > 0);
        Set(gSFU2HasAttachments, CountRows(LookUp('RM Procurement Execution Log', RequestIDText = Text(gSelectedRequest.ID) && StepNumber = 5).Attachments) > 0)
    Children:
      - rectHeader_4:
          Control: Rectangle@2.3.0
          Properties:
            Fill: =RGBA(83, 74, 183, 1)
            Height: =60
            Width: =Parent.Width
      - lblScreenTitle_3:
          Control: Label@2.5.1
          Properties:
            Color: =RGBA(255, 255, 255, 1)
            FontWeight: =FontWeight.Bold
            Height: =60
            Size: =14
            Text: ="Raw Material Procurement - Request Detail"
            Width: =615
            X: =20
      - rowTitle:
          Control: GroupContainer@1.5.0
          Variant: AutoLayout
          Properties:
            DropShadow: =DropShadow.None
            Height: =60
            LayoutAlignItems: =LayoutAlignItems.Center
            LayoutDirection: =LayoutDirection.Horizontal
            LayoutJustifyContent: =LayoutJustifyContent.SpaceBetween
            PaddingBottom: =8
            PaddingLeft: =20
            PaddingRight: =20
            PaddingTop: =8
            RadiusBottomLeft: =0
            RadiusBottomRight: =0
            RadiusTopLeft: =0
            RadiusTopRight: =0
            Width: =Parent.Width
            Y: =60
          Children:
            - lblRequestTitle_1:
                Control: Label@2.5.1
                Properties:
                  FontWeight: =FontWeight.Bold
                  Height: =36
                  PaddingLeft: =0
                  PaddingRight: =0
                  Size: =14
                  Text: =gSelectedRequest.Title
                  Width: =Parent.Width - 300
            - lblStatusBadge:
                Control: Label@2.5.1
                Properties:
                  Align: =Align.Center
                  Color: |-
                    =Switch(gSelectedRequest.Status.Value,
                      "Completed", RGBA(15, 110, 86, 1),
                      "Rejected", RGBA(163, 45, 45, 1),
                      "Pending Manager", RGBA(133, 79, 11, 1),
                      "Pending Executive", RGBA(133, 79, 11, 1),
                      "Pending Procurement", RGBA(133, 79, 11, 1),
                      "Pending Accounting", RGBA(133, 79, 11, 1),
                      RGBA(68, 68, 65, 1)
                    )
                  Fill: |-
                    =Switch(gSelectedRequest.Status.Value,
                      "Completed", RGBA(225, 245, 238, 1),
                      "Rejected", RGBA(252, 235, 235, 1),
                      "Pending Manager", RGBA(250, 238, 218, 1),
                      "Pending Executive", RGBA(250, 238, 218, 1),
                      "Pending Procurement", RGBA(250, 238, 218, 1),
                      "Pending Accounting", RGBA(250, 238, 218, 1),
                      RGBA(241, 239, 232, 1)
                    )
                  FontWeight: =FontWeight.Semibold
                  Height: =32
                  LayoutMinWidth: =220
                  Size: =10
                  Text: =gSelectedRequest.Status.Value
                  Width: =220
      - conScrollable:
          Control: GroupContainer@1.5.0
          Variant: AutoLayout
          Properties:
            DropShadow: =DropShadow.None
            Height: =Parent.Height - 180
            LayoutDirection: =LayoutDirection.Vertical
            LayoutOverflowY: =LayoutOverflow.Scroll
            RadiusBottomLeft: =0
            RadiusBottomRight: =0
            RadiusTopLeft: =0
            RadiusTopRight: =0
            Width: =Parent.Width
            Y: =120
          Children:
            - rowInfoBlock:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  DropShadow: =DropShadow.None
                  Fill: =RGBA(241, 239, 232, 1)
                  LayoutDirection: =LayoutDirection.Vertical
                  LayoutGap: =4
                  LayoutMinHeight: |-
                    =550 +
                        (24 + Max(36 + CountRows(colLineItemsDetail) * 48 + 12, 500) + 16) +
                        If(gSelectedRequest.ProcurementType.Value = "Invoice Supplied", 90, 0) +
                        If(gSelectedRequest.ProcurementType.Value = "To be sourced by Procurement", 70, 0) +
                        If(Not(IsBlank(gSelectedRequest.ConditionsText)), 88, 0) +
                        If(Not(IsBlank(gSelectedRequest.AccountingHandlerID)), 68, 0) +
                        If(
                            gSelectedRequest.Status.Value = "Goods Receipt & Acceptance" ||
                            gSelectedRequest.Status.Value = "Pending Supplier Follow-up" ||
                            gSelectedRequest.Status.Value = "Pending Invoice" ||
                            gSelectedRequest.Status.Value = "Pending Accounting" ||
                            gSelectedRequest.Status.Value = "Completed" ||
                            (gSelectedRequest.Status.Value = "Rejected" && Not(IsBlank(gSelectedRequest.GoodsReceiptBy))),
                            200 +
                            If(Not(IsBlank(gSelectedRequest.GoodsReceiptRemarks)), 70, 0) +
                            If(Not(IsBlank(gSelectedRequest.FollowUpReceiptBy)), 160, 0) +
                            If(Not(IsBlank(gSelectedRequest.FollowUpRemarks)), 70, 0) +
                            If(Not(IsBlank(gSelectedRequest.SupplierFollowUpNotes)), 70, 0) +
                            If(Not(IsBlank(gSelectedRequest.CreditNote)), 100, 0) +
                            If(gGRHasAttachments, 50, 0) +
                            If(gSFU1HasAttachments, 70, 0) +
                            If(gSFU2HasAttachments, 50, 0),
                            0
                        )
                  PaddingBottom: =20
                  PaddingLeft: =20
                  PaddingRight: =20
                  PaddingTop: =20
                  RadiusBottomLeft: =0
                  RadiusBottomRight: =0
                  RadiusTopLeft: =0
                  RadiusTopRight: =0
                  Width: =Parent.Width
                Children:
                  - rowInfo1:
                      Control: GroupContainer@1.5.0
                      Variant: AutoLayout
