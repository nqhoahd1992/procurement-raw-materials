                  DropShadow: =DropShadow.None
                  Height: =120
                  LayoutDirection: =LayoutDirection.Vertical
                  LayoutGap: =4
                  LayoutMinHeight: =140
                  PaddingBottom: =8
                  PaddingLeft: =20
                  PaddingRight: =20
                  PaddingTop: =8
