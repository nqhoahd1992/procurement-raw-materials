                        Width: =300
                  - txtRejectionReason:
                      Control: TextInput@0.0.54
                      Properties:
                        Height: =80
                        Mode: ='TextInputCanvas.Mode'.Multiline
                        Width: =Parent.Width
      - conActionBar_3:
          Control: GroupContainer@1.5.0
          Variant: AutoLayout
          Properties:
            DropShadow: =DropShadow.None
            Fill: =RGBA(255, 255, 255, 1)
            Height: =60
            LayoutAlignItems: =LayoutAlignItems.Center
            LayoutDirection: =LayoutDirection.Horizontal
            LayoutGap: =12
            LayoutJustifyContent: =LayoutJustifyContent.SpaceBetween
            PaddingBottom: =8
            PaddingLeft: =20
            PaddingRight: =20
            PaddingTop: =8
            RadiusBottomLeft: =0
            RadiusBottomRight: =0
            RadiusTopLeft: =0
            RadiusTopRight: =0
            Width: =Parent.Width
            Y: =Parent.Height - 60
          Children:
            - btnBack_2:
                Control: Button@0.0.45
                Properties:
                  Height: =36
                  OnSelect: =Navigate(RequestDetailScreen)
                  Text: ="← Back"
                  Width: =100
                  X: =Parent.Width - 120
                  Y: =40
            - conActionBarBtn_3:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  AlignInContainer: =AlignInContainer.SetByContainer
                  DropShadow: =DropShadow.None
                  Height: =36
                  LayoutAlignItems: =LayoutAlignItems.Center
                  LayoutDirection: =LayoutDirection.Horizontal
                  LayoutGap: =10
                  LayoutJustifyContent: =LayoutJustifyContent.End
                  LayoutMinHeight: =16
                  LayoutMinWidth: =16
                  RadiusBottomLeft: =0
                  RadiusBottomRight: =0
                  RadiusTopLeft: =0
                  RadiusTopRight: =0
                Children:
                  - btnCancelExec:
                      Control: Button@0.0.45
                      Properties:
                        Height: =36
                        OnSelect: =Navigate(HomeScreen)
                        Text: ="Cancel"
                        Width: =160
                        X: =40
                        Y: =40
                  - btnSubmitExec:
                      Control: Button@0.0.45
                      Properties:
                        Height: =36
                        OnSelect: |-
                          =If(
                              IsBlank(rdoExecutiveDecision.Selected.Value),
                              Notify("Please select a decision", NotificationType.Error),
                              If(
                                  rdoExecutiveDecision.Selected.Value = "Approve with conditions" && IsBlank(txtApprovalConditions.Value),
                                  Notify("Approval Conditions is required", NotificationType.Error),
                                  If(
                                      rdoExecutiveDecision.Selected.Value = "Reject" && IsBlank(txtRejectionReason.Value),
                                      Notify("Rejection Reason is required", NotificationType.Error),
                                      With(
                                          {wLog: Patch(
                                              Procurement_ApprovalLog,
                                              Defaults(Procurement_ApprovalLog),
                                              {
                                                  Title: "Step 3 - " & rdoExecutiveDecision.Selected.Value & " - " & gSelectedRequest.Title,
                                                  RequestID: {Id: gSelectedRequest.ID, Value: gSelectedRequest.Title},
                                                  RequestIDText: Text(gSelectedRequest.ID),
                                                  StepNumber: 3,
                                                  ApproverID: {Id: gCurrentEmployee.ID, Value: gCurrentEmployee.Title},
                                                  Decision: {Value: rdoExecutiveDecision.Selected.Value},
                                                  ApprovalConditions: If(
                                                      rdoExecutiveDecision.Selected.Value = "Approve with conditions",
                                                      txtApprovalConditions.Value,
                                                      ""
                                                  ),
                                                  RejectionReason: If(
                                                      rdoExecutiveDecision.Selected.Value = "Reject",
                                                      txtRejectionReason.Value,
                                                      ""
                                                  )
                                              }
                                          )},
                                          If(
                                              IsBlank(wLog.ID),
                                              Notify("Failed to save approval log. Please try again.", NotificationType.Error),
                                              With(
                                                  {wReq: Patch(
                                                      Procurement_Requests,
                                                      gSelectedRequest,
                                                      {
                                                          Status: {Value: If(
                                                              rdoExecutiveDecision.Selected.Value = "Reject",
                                                              "Rejected",
                                                              "Pending Procurement"
                                                          )},
                                                          ConditionsText: If(
                                                              rdoExecutiveDecision.Selected.Value = "Approve with conditions",
                                                              txtApprovalConditions.Value,
                                                              ""
                                                          )
                                                      }
                                                  )},
                                                  If(
