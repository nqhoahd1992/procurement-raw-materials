                      Properties:
                        DropShadow: =DropShadow.None
                        LayoutDirection: =LayoutDirection.Vertical
                        LayoutGap: =2
                        LayoutMinHeight: =80
                        PaddingTop: =8
                        RadiusBottomLeft: =0
                        RadiusBottomRight: =0
                        RadiusTopLeft: =0
                        RadiusTopRight: =0
                        Width: =Parent.Width
                      Children:
                        - lblManagerRemarksLabel:
                            Control: Label@2.5.1
                            Properties:
                              Color: =RGBA(136, 135, 128, 1)
                              Height: =20
                              Size: =9
                              Text: ="Manager Remarks"
                              Width: =Parent.Width
                        - lblManagerRemarksValue:
                            Control: Label@2.5.1
                            Properties:
                              AutoHeight: =true
                              FillPortions: =1
                              FontWeight: =FontWeight.Semibold
                              Height: =69
                              Overflow: =Overflow.Scroll
                              Size: =11
                              Text: =LookUp(Procurement_ApprovalLog, RequestIDText = Text(gSelectedRequest.ID) && StepNumber = 2).ManagerRemarks
                              VerticalAlign: =VerticalAlign.Top
                              Width: =Parent.Width
                  - colManagerDecision:
                      Control: GroupContainer@1.5.0
                      Variant: AutoLayout
                      Properties:
                        DropShadow: =DropShadow.None
                        LayoutDirection: =LayoutDirection.Vertical
                        LayoutGap: =2
                        LayoutMinHeight: =40
                        PaddingTop: =4
                        RadiusBottomLeft: =0
                        RadiusBottomRight: =0
                        RadiusTopLeft: =0
