                              Size: =9
                              Text: ="Manager Decision"
                              Width: =Parent.Width
                        - lblManagerDecisionValue:
                            Control: Label@2.5.1
                            Properties:
                              FillPortions: =1
                              FontWeight: =FontWeight.Semibold
                              Height: =24
                              LayoutMinHeight: =30
                              Size: =11
                              Text: =LookUp(Procurement_ApprovalLog, RequestIDText = Text(gSelectedRequest.ID) && StepNumber = 2).Decision.Value
                              VerticalAlign: =VerticalAlign.Top
                              Width: =Parent.Width
            - rowDecisionTitle:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  DropShadow: =DropShadow.None
                  LayoutDirection: =LayoutDirection.Vertical
                  LayoutGap: =4
                  LayoutMinHeight: =160
                  PaddingBottom: =4
                  PaddingLeft: =20
                  PaddingRight: =20
                  PaddingTop: =16
                  RadiusBottomLeft: =0
                  RadiusBottomRight: =0
                  RadiusTopLeft: =0
                  RadiusTopRight: =0
                  Width: =Parent.Width
                Children:
                  - lblExecutiveDecisionLabel:
                      Control: Label@2.5.1
                      Properties:
                        FontWeight: =FontWeight.Semibold
                        Height: =28
                        Size: =12
                        Text: ="Executive Decision *"
                        Width: =300
                  - rdoExecutiveDecision:
                      Control: Radio@0.0.25
                      Properties:
                        Items: =["Approve", "Approve with conditions", "Reject"]
                        Width: =600
            - rowApprovalConditions:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  DropShadow: =DropShadow.None
                  Height: =120
                  LayoutDirection: =LayoutDirection.Vertical
                  LayoutGap: =4
                  LayoutMinHeight: =140
                  PaddingBottom: =8
                  PaddingLeft: =20
                  PaddingRight: =20
                  PaddingTop: =8
                  RadiusBottomLeft: =0
                  RadiusBottomRight: =0
                  RadiusTopLeft: =0
                  RadiusTopRight: =0
