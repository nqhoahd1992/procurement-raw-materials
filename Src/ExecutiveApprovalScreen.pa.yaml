                              LayoutDirection: =LayoutDirection.Vertical
                              LayoutGap: =2
                              LayoutMinHeight: =60
                              RadiusBottomLeft: =0
                              RadiusBottomRight: =0
                              RadiusTopLeft: =0
                              RadiusTopRight: =0
                              Width: =Parent.Width / 2
                            Children:
                              - lblChk3Readonly:
                                  Control: Label@2.5.1
                                  Properties:
                                    Color: =RGBA(15, 110, 86, 1)
                                    Height: =24
                                    Size: =10
                                    Text: ="✓ Within approved departmental budget"
                                    Width: =Parent.Width
                              - lblChk4Readonly:
                                  Control: Label@2.5.1
                                  Properties:
                                    Color: =RGBA(15, 110, 86, 1)
                                    Height: =24
                                    Size: =10
                                    Text: ="✓ Timing and urgency are appropriate"
