Screens:
  RequesterInvoiceScreen:
    Properties:
      LoadingSpinnerColor: =RGBA(56, 96, 178, 1)
      OnVisible: |-
        =Set(gHasInvoiceResult, false);
        Set(gInvoiceResult, Blank());
        Set(gPendingNewAttName, "");
        Set(gSelectedRequest, LookUp('RM Procurement Requests', ID = gSelectedRequest.ID))
    Children:
      - rectHeader_RIS:
          Control: Rectangle@2.3.0
          Properties:
            Fill: =RGBA(83, 74, 183, 1)
            Height: =60
            Width: =Parent.Width
      - lblScreenTitle_RIS:
          Control: Label@2.5.1
          Properties:
            Color: =RGBA(255, 255, 255, 1)
            FontWeight: =FontWeight.Bold
            Height: =60
            Size: =14
            Text: ="Raw  Procurement - Submit Invoice"
            Width: =600
            X: =20
      - lblUserInfo_RIS:
          Control: Label@2.5.1
          Properties:
            Align: =Align.Right
            Color: =RGBA(255, 255, 255, 1)
            FontWeight: =FontWeight.Semibold
            Height: =60
            Size: =12
            Text: |-
              =If(
                  IsBlank(gCurrentUser.Role.Value),
                  gCurrentEmployee.Title,
                  gCurrentEmployee.Title & " | " & gCurrentUser.Role.Value
              )
            Width: =280
            X: =Parent.Width - 300
      - rowInfoBlock_RIS:
          Control: GroupContainer@1.5.0
          Variant: AutoLayout
          Properties:
            DropShadow: =DropShadow.None
            Fill: =RGBA(245, 245, 250, 1)
            Height: =180
            LayoutDirection: =LayoutDirection.Vertical
            LayoutGap: =4
            PaddingBottom: =12
            PaddingLeft: =20
            PaddingRight: =20
            PaddingTop: =12
            RadiusBottomLeft: =0
            RadiusBottomRight: =0
            RadiusTopLeft: =0
            RadiusTopRight: =0
            Width: =Parent.Width
            Y: =60
          Children:
            - rowInfoLine1_RIS:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  DropShadow: =DropShadow.None
                  FillPortions: =0
                  Height: =34
                  LayoutAlignItems: =LayoutAlignItems.Center
                  LayoutDirection: =LayoutDirection.Horizontal
                  LayoutGap: =16
                  LayoutJustifyContent: =LayoutJustifyContent.SpaceBetween
                  LayoutMinHeight: =24
                  RadiusBottomLeft: =0
                  RadiusBottomRight: =0
                  RadiusTopLeft: =0
                  RadiusTopRight: =0
                  Width: =Parent.Width - 40
                Children:
                  - lblInfoTitle_RIS:
                      Control: Label@2.5.1
                      Properties:
                        FillPortions: =1
                        FontWeight: =FontWeight.Bold
                        Height: =24
                        PaddingLeft: =0
                        PaddingRight: =0
                        Size: =14
                        Text: =gSelectedRequest.Title
                        Width: =600
                  - lblStatusBadge_RIS:
                      Control: Label@2.5.1
                      Properties:
                        Align: =Align.Center
                        BorderColor: =RGBA(133, 79, 11, 1)
                        BorderThickness: =1
                        Color: =RGBA(133, 79, 11, 1)
                        Fill: =RGBA(250, 238, 218, 1)
                        FontWeight: =FontWeight.Semibold
                        Height: =32
                        PaddingLeft: =8
                        PaddingRight: =8
                        Size: =10
                        Text: =gSelectedRequest.Status.Value
                        Width: =220
            - rowInfoLine2_RIS:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  DropShadow: =DropShadow.None
                  LayoutAlignItems: =LayoutAlignItems.Center
                  LayoutDirection: =LayoutDirection.Horizontal
                  LayoutGap: =24
                  LayoutMinHeight: =44
                  RadiusBottomLeft: =0
                  RadiusBottomRight: =0
                  RadiusTopLeft: =0
                  RadiusTopRight: =0
                  Width: =Parent.Width - 40
                Children:
                  - colRequester_RIS:
                      Control: GroupContainer@1.5.0
                      Variant: AutoLayout
                      Properties:
                        DropShadow: =DropShadow.None
                        LayoutDirection: =LayoutDirection.Vertical
                        LayoutGap: =2
                        RadiusBottomLeft: =0
                        RadiusBottomRight: =0
                        RadiusTopLeft: =0
                        RadiusTopRight: =0
                        Width: =240
                      Children:
                        - lblInfoRequesterLabel_RIS:
                            Control: Label@2.5.1
                            Properties:
                              Color: =RGBA(136, 135, 128, 1)
                              Height: =18
                              PaddingLeft: =0
                              Size: =9
                              Text: ="Requester"
                              Width: =240
                        - lblInfoRequesterValue_RIS:
                            Control: Label@2.5.1
                            Properties:
                              FontWeight: =FontWeight.Semibold
                              Height: =20
                              PaddingLeft: =0
                              Size: =11
                              Text: =gSelectedRequest.RequesterID.Value
                              Width: =240
                  - colCost_RIS:
                      Control: GroupContainer@1.5.0
                      Variant: AutoLayout
                      Properties:
                        DropShadow: =DropShadow.None
                        LayoutDirection: =LayoutDirection.Vertical
                        LayoutGap: =2
                        RadiusBottomLeft: =0
                        RadiusBottomRight: =0
                        RadiusTopLeft: =0
                        RadiusTopRight: =0
                        Width: =240
                      Children:
                        - lblInfoCostLabel_RIS:
                            Control: Label@2.5.1
                            Properties:
                              Color: =RGBA(136, 135, 128, 1)
                              Height: =18
                              PaddingLeft: =0
                              Size: =9
                              Text: ="Estimated Cost"
                              Width: =240
                        - lblInfoCostValue_RIS:
                            Control: Label@2.5.1
                            Properties:
                              FontWeight: =FontWeight.Semibold
                              Height: =20
                              PaddingLeft: =0
                              Size: =11
                              Text: =gSelectedRequest.Currency & " " & Text(gSelectedRequest.EstimatedCost, "#,###")
                              Width: =240
            - rowInfoLine3_RIS:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  DropShadow: =DropShadow.None
                  LayoutAlignItems: =LayoutAlignItems.Center
                  LayoutDirection: =LayoutDirection.Horizontal
                  LayoutGap: =24
                  LayoutMinHeight: =44
                  RadiusBottomLeft: =0
                  RadiusBottomRight: =0
                  RadiusTopLeft: =0
                  RadiusTopRight: =0
                  Width: =Parent.Width - 40
                Children:
                  - colInvoiceType_RIS:
                      Control: GroupContainer@1.5.0
                      Variant: AutoLayout
                      Properties:
                        DropShadow: =DropShadow.None
                        LayoutDirection: =LayoutDirection.Vertical
                        LayoutGap: =2
                        RadiusBottomLeft: =0
                        RadiusBottomRight: =0
                        RadiusTopLeft: =0
                        RadiusTopRight: =0
                        Width: =240
                      Children:
                        - lblInfoInvoiceTypeLabel_RIS:
                            Control: Label@2.5.1
                            Properties:
                              Color: =RGBA(136, 135, 128, 1)
                              Height: =18
                              PaddingLeft: =0
                              Size: =9
                              Text: ="Invoice Type"
                              Width: =240
                        - lblInfoInvoiceTypeValue_RIS:
                            Control: Label@2.5.1
                            Properties:
                              Color: =If(gSelectedRequest.InvoiceType.Value = "Official Invoice", RGBA(15, 110, 86, 1), RGBA(133, 79, 11, 1))
                              FontWeight: =FontWeight.Semibold
                              Height: =20
                              PaddingLeft: =0
                              Size: =11
                              Text: =If(IsBlank(gSelectedRequest.InvoiceType.Value), "—", gSelectedRequest.InvoiceType.Value)
                              Width: =240
      - conScrollable_RIS:
          Control: GroupContainer@1.5.0
          Variant: AutoLayout
          Properties:
            DropShadow: =DropShadow.None
            Height: =Parent.Height - 300
            LayoutDirection: =LayoutDirection.Vertical
            LayoutOverflowY: =LayoutOverflow.Scroll
            RadiusBottomLeft: =0
            RadiusBottomRight: =0
            RadiusTopLeft: =0
            RadiusTopRight: =0
            Width: =Parent.Width
            Y: =240
          Children:
            - rowAlreadySubmitted_RIS:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  DropShadow: =DropShadow.None
                  Fill: =If(gSelectedRequest.InvoiceSubmitted, RGBA(225, 245, 238, 1), RGBA(219, 234, 254, 1))
                  LayoutDirection: =LayoutDirection.Vertical
                  LayoutGap: =8
                  PaddingBottom: =16
                  PaddingLeft: =20
                  PaddingRight: =20
                  PaddingTop: =16
                  RadiusBottomLeft: =0
                  RadiusBottomRight: =0
                  RadiusTopLeft: =0
                  RadiusTopRight: =0
                  Visible: =Not(IsBlank(gSelectedRequest.RequesterInvoiceURL))
                  Width: =Parent.Width
                Children:
                  - lblAlreadySubmittedMsg_RIS:
                      Control: Label@2.5.1
                      Properties:
                        Color: =If(gSelectedRequest.InvoiceSubmitted, RGBA(15, 110, 86, 1), RGBA(30, 64, 175, 1))
                        FontWeight: =FontWeight.Semibold
                        Height: =24
                        Size: =12
                        Text: =If(gSelectedRequest.InvoiceSubmitted, "Invoice has been processed by Procurement — no further changes allowed.", "Invoice on file — upload a new file below to replace it.")
                        Width: =Parent.Width - 40
                  - lblExistingInvoiceLabel_RIS:
                      Control: Label@2.5.1
                      Properties:
                        Color: =RGBA(136, 135, 128, 1)
                        Height: =20
                        Size: =10
                        Text: ="Submitted file:"
                        Width: =Parent.Width - 40
                  - lblExistingInvoiceURL_RIS:
                      Control: Label@2.5.1
                      Properties:
                        Color: =RGBA(56, 96, 178, 1)
                        FontWeight: =FontWeight.Semibold
                        Height: =28
                        OnSelect: =Launch(gSelectedRequest.RequesterInvoiceURL, {}, LaunchTarget.New)
                        Size: =11
                        Text: =gSelectedRequest.RequesterInvoiceURL
                        Underline: =true
                        Width: =Parent.Width - 40
                        Wrap: =false
                  - btnRemoveInvoice_RIS:
                      Control: Button@0.0.45
                      Properties:
                        BasePaletteColor: =RGBA(163, 45, 45, 1)
                        OnSelect: |-
                          =With(
                              {wPatched: Patch('RM Procurement Requests', gSelectedRequest, {RequesterInvoiceURL: ""})},
                              If(
                                  IsBlank(wPatched.ID),
                                  Notify("Failed to remove. Please try again.", NotificationType.Error),
                                  Set(gSelectedRequest, LookUp('RM Procurement Requests', ID = gSelectedRequest.ID));
                                  Notify("Invoice removed.", NotificationType.Success)
                              )
                          )
                        Text: ="Remove Invoice"
                        Visible: =!gSelectedRequest.InvoiceSubmitted
                        Width: =160
            - rowUploadSection_RIS:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  DropShadow: =DropShadow.None
                  LayoutDirection: =LayoutDirection.Vertical
                  LayoutGap: =8
                  PaddingBottom: =16
                  PaddingLeft: =20
                  PaddingRight: =20
                  PaddingTop: =16
                  RadiusBottomLeft: =0
                  RadiusBottomRight: =0
                  RadiusTopLeft: =0
                  RadiusTopRight: =0
                  Visible: =!gSelectedRequest.InvoiceSubmitted
                  Width: =Parent.Width
                Children:
                  - lblUploadHeader_RIS:
                      Control: Label@2.5.1
                      Properties:
                        FontWeight: =FontWeight.Semibold
                        Height: =24
                        Size: =12
                        Text: ="Upload Corrected Supplier Invoice *"
                        Width: =Parent.Width - 40
                  - lblUploadHint_RIS:
                      Control: Label@2.5.1
                      Properties:
                        Color: =RGBA(136, 135, 128, 1)
                        Size: =10
                        Text: ="Upload the corrected invoice you received from the supplier. Procurement will be notified once submitted."
                        Width: =Parent.Width - 40
                  - formRequesterInvoice:
                      Control: Form@2.4.4
                      Variant: Classic
                      Layout: Vertical
                      Properties:
                        DataSource: ='RM Procurement Requests'
                        Height: =120
                        Item: =gSelectedRequest
                        LayoutMinWidth: =100
                        NumberOfColumns: =1
                        OnFailure: =Notify("Upload failed. Please try again.", NotificationType.Error)
                        OnSuccess: |-
                          =With(
                              {wURL: gSharePointAttachmentBase & Text(gSelectedRequest.ID) & "/" & EncodeUrl(gPendingNewAttName)},
                              With(
                                  {wReq: Patch('RM Procurement Requests', gSelectedRequest, {RequesterInvoiceURL: wURL})},
                                  If(
                                      IsBlank(wReq.ID),
                                      Notify("Failed to save. Please try again.", NotificationType.Error),
                                      Procurement_Notify_Invoice_Provided.Run(
                                          gSelectedRequest.Title,
                                          gSelectedRequest.ID,
                                          wURL
                                      );
                                      Set(gSelectedRequest, LookUp('RM Procurement Requests', ID = gSelectedRequest.ID));
                                      Notify("Invoice submitted. Procurement has been notified.", NotificationType.Success);
                                      Navigate(HomeScreen)
                                  )
                              )
                          )
                        Width: =Parent.Width - 40
                      Children:
                        - dcRequesterInvoice:
                            Control: TypedDataCard@1.0.7
                            Variant: ClassicAttachmentsEdit
                            Properties:
                              DataField: ="{Attachments}"
                              Default: =Blank()
                              DisplayMode: =DisplayMode.Edit
                              DisplayName: =""
                              Height: =100
                              Required: =false
                              Update: =attRequesterInvoice.Attachments
                              Width: =Parent.Width
                              X: =0
                              Y: =0
                            Children:
                              - lblAttachLabel_RIS:
                                  Control: Label@2.5.1
                                  Properties:
                                    FontWeight: =FontWeight.Bold
                                    Height: =28
                                    PaddingLeft: =0
                                    Size: =11
                                    Text: ="Invoice File *"
                                    Width: =Parent.Width
                              - attRequesterInvoice:
                                  Control: Attachments@2.3.0
                                  Properties:
                                    Height: =100
                                    Items: =Parent.Default
                                    MaxAttachments: =1
                                    Width: =Parent.Width
      - conActionBar_RIS:
          Control: GroupContainer@1.5.0
          Variant: AutoLayout
          Properties:
            DropShadow: =DropShadow.None
            Fill: =RGBA(255, 255, 255, 1)
            Height: =60
            LayoutAlignItems: =LayoutAlignItems.Center
            LayoutDirection: =LayoutDirection.Horizontal
            LayoutGap: =12
            LayoutJustifyContent: =LayoutJustifyContent.SpaceBetween
            PaddingBottom: =8
            PaddingLeft: =20
            PaddingRight: =20
            PaddingTop: =8
            RadiusBottomLeft: =0
            RadiusBottomRight: =0
            RadiusTopLeft: =0
            RadiusTopRight: =0
            Width: =Parent.Width
            Y: =Parent.Height - 60
          Children:
            - btnBack_RIS:
                Control: Button@0.0.45
                Properties:
                  Height: =36
                  OnSelect: =Navigate(HomeScreen)
                  Text: ="← Back"
                  Width: =100
            - btnSubmit_RIS:
                Control: Button@0.0.45
                Properties:
                  BasePaletteColor: =RGBA(5, 102, 178, 1)
                  Height: =36
                  OnSelect: |-
                    =If(
                        gSelectedRequest.InvoiceSubmitted,
                        Navigate(HomeScreen),
                        If(
                            CountRows(attRequesterInvoice.Attachments) = 0,
                            Notify("Please attach the invoice file before submitting.", NotificationType.Error),
                            Set(gPendingNewAttName, Last(attRequesterInvoice.Attachments).Name);
                            SubmitForm(formRequesterInvoice)
                        )
                    )
                  Text: =If(gSelectedRequest.InvoiceSubmitted, "Back to Home", "Submit Invoice →")
                  Width: =180
