Screens:
  GoodsReceiptScreen:
    Properties:
      LoadingSpinnerColor: =RGBA(56, 96, 178, 1)
      OnVisible: |-
        =Set(gGRLogEntry, Blank());
        Set(gGRPendingAttachments, Blank());
        NewForm(frmGRLog_GR);
        Set(gSelectedRequest, LookUp('RM Procurement Requests', ID = gSelectedRequest.ID));
        ClearCollect(colLineItemsDetail, Filter('RM Procurement Line Items', RequestIDText = Text(gSelectedRequest.ID)));
        Set(gGRDelegationMode, If(IsBlank(gSelectedRequest.GRAssignedToID) || gSelectedRequest.GRAssignedToID.Id = 0 || gSelectedRequest.GRAssignedToID.Id = gCurrentEmployee.ID, "I will receive", "Assign to someone else"))
    Children:
      - rectHeader_GR:
          Control: Rectangle@2.3.0
          Properties:
            Fill: =RGBA(83, 74, 183, 1)
            Height: =60
            Width: =Parent.Width
      - lblScreenTitle_GR:
          Control: Label@2.5.1
          Properties:
            Color: =RGBA(255, 255, 255, 1)
            FontWeight: =FontWeight.Bold
            Height: =60
            Size: =14
            Text: ="Max Biocare Procurement - Goods Receipt & Acceptance"
            Width: =773
            X: =20
      - rowInfoBlock_GR:
          Control: GroupContainer@1.5.0
          Variant: AutoLayout
          Properties:
            DropShadow: =DropShadow.None
            Fill: =RGBA(245, 245, 250, 1)
            Height: =120
            LayoutDirection: =LayoutDirection.Vertical
            LayoutGap: =4
            PaddingBottom: =12
            PaddingLeft: =20
            PaddingRight: =20
            PaddingTop: =12
            RadiusBottomLeft: =0
            RadiusBottomRight: =0
            RadiusTopLeft: =0
            RadiusTopRight: =0
            Width: =Parent.Width
            Y: =60
          Children:
            - rowInfoLine1_GR:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  DropShadow: =DropShadow.None
                  FillPortions: =0
                  Height: =34
                  LayoutAlignItems: =LayoutAlignItems.Center
                  LayoutDirection: =LayoutDirection.Horizontal
                  LayoutGap: =16
                  LayoutJustifyContent: =LayoutJustifyContent.SpaceBetween
                  LayoutMinHeight: =24
                  RadiusBottomLeft: =0
                  RadiusBottomRight: =0
                  RadiusTopLeft: =0
                  RadiusTopRight: =0
                  Width: =Parent.Width - 40
                Children:
                  - lblInfoTitle_GR:
                      Control: Label@2.5.1
                      Properties:
                        FillPortions: =1
                        FontWeight: =FontWeight.Bold
                        Height: =24
                        PaddingLeft: =0
                        PaddingRight: =0
                        Size: =14
                        Text: =gSelectedRequest.Title
                        Width: =600
                  - lblStatusBadge_GR:
                      Control: Label@2.5.1
                      Properties:
                        Align: =Align.Center
                        BorderColor: =RGBA(133, 79, 11, 1)
                        BorderThickness: =1
                        Color: =RGBA(133, 79, 11, 1)
                        Fill: =RGBA(250, 238, 218, 1)
                        FontWeight: =FontWeight.Semibold
                        Height: =32
                        PaddingLeft: =8
                        PaddingRight: =8
                        Size: =10
                        Text: =gSelectedRequest.Status.Value
                        Width: =220
            - rowInfoLine2_GR:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  DropShadow: =DropShadow.None
                  LayoutAlignItems: =LayoutAlignItems.Center
                  LayoutDirection: =LayoutDirection.Horizontal
                  LayoutGap: =24
                  LayoutMinHeight: =44
                  RadiusBottomLeft: =0
                  RadiusBottomRight: =0
                  RadiusTopLeft: =0
                  RadiusTopRight: =0
                  Width: =Parent.Width - 40
                Children:
                  - colRequester_GR:
                      Control: GroupContainer@1.5.0
                      Variant: AutoLayout
                      Properties:
                        DropShadow: =DropShadow.None
                        LayoutDirection: =LayoutDirection.Vertical
                        LayoutGap: =2
                        RadiusBottomLeft: =0
                        RadiusBottomRight: =0
                        RadiusTopLeft: =0
                        RadiusTopRight: =0
                        Width: =240
                      Children:
                        - lblInfoRequesterLabel_GR:
                            Control: Label@2.5.1
                            Properties:
                              Color: =RGBA(136, 135, 128, 1)
                              Height: =18
                              PaddingLeft: =0
                              Size: =9
                              Text: ="Requester"
                              Width: =240
                        - lblInfoRequesterValue_GR:
                            Control: Label@2.5.1
                            Properties:
                              FontWeight: =FontWeight.Semibold
                              Height: =20
                              PaddingLeft: =0
                              Size: =11
                              Text: =gSelectedRequest.RequesterID.Value
                              Width: =240
                  - colCost_GR:
                      Control: GroupContainer@1.5.0
                      Variant: AutoLayout
                      Properties:
                        DropShadow: =DropShadow.None
                        LayoutDirection: =LayoutDirection.Vertical
                        LayoutGap: =2
                        RadiusBottomLeft: =0
                        RadiusBottomRight: =0
                        RadiusTopLeft: =0
                        RadiusTopRight: =0
                        Width: =240
                      Children:
                        - lblInfoCostLabel_GR:
                            Control: Label@2.5.1
                            Properties:
                              Color: =RGBA(136, 135, 128, 1)
                              Height: =18
                              PaddingLeft: =0
                              Size: =9
                              Text: ="Estimated Cost"
                              Width: =240
                        - lblInfoCostValue_GR:
                            Control: Label@2.5.1
                            Properties:
                              FontWeight: =FontWeight.Semibold
                              Height: =20
                              PaddingLeft: =0
                              Size: =11
                              Text: =gSelectedRequest.Currency & " " & Text(gSelectedRequest.EstimatedCost, "#,###")
                              Width: =240
      - conScrollable_GR:
          Control: GroupContainer@1.5.0
          Variant: AutoLayout
          Properties:
            DropShadow: =DropShadow.None
            Height: =Parent.Height - 240
            LayoutDirection: =LayoutDirection.Vertical
            LayoutOverflowY: =LayoutOverflow.Scroll
            RadiusBottomLeft: =0
            RadiusBottomRight: =0
            RadiusTopLeft: =0
            RadiusTopRight: =0
            Width: =Parent.Width
            Y: =180
          Children:
            - rowDelegation_GR:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  DropShadow: =DropShadow.None
                  FillPortions: =0
                  Height: =If(gGRDelegationMode = "Assign to someone else", 200, 100)
                  LayoutDirection: =LayoutDirection.Vertical
                  LayoutGap: =8
                  PaddingBottom: =12
                  PaddingLeft: =20
                  PaddingRight: =20
                  PaddingTop: =16
                  RadiusBottomLeft: =0
                  RadiusBottomRight: =0
                  RadiusTopLeft: =0
                  RadiusTopRight: =0
                  Visible: |-
                    =gSelectedRequest.RequesterEmail = gCurrentEmployee.Email
                    && IsBlank(LookUp('RM Procurement Execution Log', RequestIDText = Text(gSelectedRequest.ID) && StepNumber = 3))
                  Width: =Parent.Width
                Children:
                  - lblDelegationHeader_GR:
                      Control: Label@2.5.1
                      Properties:
                        FontWeight: =FontWeight.Semibold
                        Height: =24
                        Size: =12
                        Text: ="Goods Receiver"
                        Width: =Parent.Width - 40
                  - rowReceiverToggle_GR:
                      Control: GroupContainer@1.5.0
                      Variant: AutoLayout
                      Properties:
                        DropShadow: =DropShadow.None
                        FillPortions: =0
                        Height: =40
                        LayoutDirection: =LayoutDirection.Horizontal
                        LayoutGap: =8
                        RadiusBottomLeft: =0
                        RadiusBottomRight: =0
                        RadiusTopLeft: =0
                        RadiusTopRight: =0
                        Width: =Parent.Width - 40
                      Children:
                        - btnIWillReceive_GR:
                            Control: Button@0.0.45
                            Properties:
                              BasePaletteColor: =If(gGRDelegationMode = "I will receive", RGBA(83, 74, 183, 1), RGBA(166, 166, 166, 1))
                              BorderColor: =If(gGRDelegationMode = "I will receive", RGBA(83, 74, 183, 1), RGBA(200, 200, 200, 1))
                              BorderThickness: =If(gGRDelegationMode = "I will receive", 2, 1)
                              Height: =40
                              OnSelect: |-
                                =If(
                                    Not(IsBlank(gSelectedRequest.GRAssignedToID)),
                                    Procurement_Notify_Receipt_Assignee.Run(
                                    LookUp('Employee List', ID = gSelectedRequest.GRAssignedToID.Id).email,
                                    gSelectedRequest.GRAssignedToID.Value,
                                    gSelectedRequest.Title,
                                    gSelectedRequest.ID,
                                    "Unassigned",
                                    Text(gSelectedRequest.RequiredDeliveryDate, "dd/mm/yyyy"),
                                    ""
                                    )
                                );
                                Set(gGRDelegationMode, "I will receive");
                                Set(gSelectedRequest, Patch('RM Procurement Requests', LookUp('RM Procurement Requests', ID = gSelectedRequest.ID), {GRAssignedToID: Blank()}))
                              Text: ="I will receive"
                              Width: =160
                        - btnAssignToOther_GR:
                            Control: Button@0.0.45
                            Properties:
                              BasePaletteColor: =If(gGRDelegationMode = "Assign to someone else", RGBA(83, 74, 183, 1), RGBA(166, 166, 166, 1))
                              BorderColor: =If(gGRDelegationMode = "Assign to someone else", RGBA(83, 74, 183, 1), RGBA(200, 200, 200, 1))
                              BorderThickness: =If(gGRDelegationMode = "Assign to someone else", 2, 1)
                              Height: =40
                              OnSelect: =Set(gGRDelegationMode, "Assign to someone else")
                              Text: ="Assign to someone else"
                              Width: =200
                  - rowAssignReceiver_GR:
                      Control: GroupContainer@1.5.0
                      Variant: AutoLayout
                      Properties:
                        DropShadow: =DropShadow.None
                        FillPortions: =0
                        Height: =100
                        LayoutDirection: =LayoutDirection.Vertical
                        LayoutGap: =4
                        RadiusBottomLeft: =0
                        RadiusBottomRight: =0
                        RadiusTopLeft: =0
                        RadiusTopRight: =0
                        Visible: =gGRDelegationMode = "Assign to someone else"
                        Width: =Parent.Width - 40
                      Children:
                        - lblAssignReceiverLabel_GR:
                            Control: Label@2.5.1
                            Properties:
                              FontWeight: =FontWeight.Bold
                              Height: =24
                              Size: =11
                              Text: ="Assign to *"
                              Width: =Parent.Width
                        - ddAssignReceiver_GR:
                            Control: ModernCombobox@1.1.1
                            Properties:
                              AllowExternalSelectedItems: =false
                              FontWeight: =""
                              Height: =40
                              InputTextPlaceholder: ="Select an employee"
                              ItemDisplayText: =ThisItem.Title
                              Items: =Sort(Filter('Employee List', ID in ForAll(Filter('RM User', IsActive), EmployeeID.Id)), Title, SortOrder.Ascending)
                              SelectMultiple: =false
                              Size: =0
                              Width: =Parent.Width
                        - lblCurrentAssignee_GR:
                            Control: Label@2.5.1
                            Properties:
                              Color: =RGBA(83, 74, 183, 1)
                              Height: =20
                              Size: =10
                              Text: |-
                                =If(IsBlank(gSelectedRequest.GRAssignedToID), "", "→ Assigned to: " & gSelectedRequest.GRAssignedToID.Value)
                              Width: =Parent.Width
            - rowChecklistHeader_GR:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  DropShadow: =DropShadow.None
                  LayoutDirection: =LayoutDirection.Vertical
                  LayoutMinHeight: =70
                  PaddingBottom: =4
                  PaddingLeft: =20
                  PaddingRight: =20
                  PaddingTop: =16
                  RadiusBottomLeft: =0
                  RadiusBottomRight: =0
                  RadiusTopLeft: =0
                  RadiusTopRight: =0
                  Visible: =gGRDelegationMode = "I will receive"
                  Width: =Parent.Width
                Children:
                  - lblChecklistHeader_GR:
                      Control: Label@2.5.1
                      Properties:
                        FontWeight: =FontWeight.Semibold
                        Height: =24
                        Size: =12
                        Text: ="Goods Receipt Checklist *"
                        Width: =Parent.Width - 40
                  - lblChecklistNote_GR:
                      Control: Label@2.5.1
                      Properties:
                        Color: =RGBA(133, 79, 11, 1)
                        Height: =20
                        Size: =10
                        Text: ="All items must be checked before submitting"
                        Width: =Parent.Width - 40
            - rowCheckGR1:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  DropShadow: =DropShadow.None
                  FillPortions: =0
                  Height: =40
                  LayoutDirection: =LayoutDirection.Horizontal
                  LayoutGap: =8
                  PaddingBottom: =4
                  PaddingLeft: =20
                  PaddingRight: =20
                  PaddingTop: =4
                  RadiusBottomLeft: =0
                  RadiusBottomRight: =0
                  RadiusTopLeft: =0
                  RadiusTopRight: =0
                  Visible: =gGRDelegationMode = "I will receive"
                  Width: =Parent.Width
                Children:
                  - chkGR1:
                      Control: CheckBox@0.0.30
                      Properties:
                        AlignInContainer: =AlignInContainer.Center
                        Width: =32
                  - lblChkGR1:
                      Control: Label@2.5.1
                      Properties:
                        AlignInContainer: =AlignInContainer.Center
                        Height: =24
                        PaddingLeft: =0
                        PaddingRight: =0
                        Size: =11
                        Text: ="Items physically received"
                        Width: =Parent.Width - 60
            - rowCheckGR2:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  DropShadow: =DropShadow.None
                  FillPortions: =0
                  Height: =40
                  LayoutDirection: =LayoutDirection.Horizontal
                  LayoutGap: =8
                  PaddingBottom: =4
                  PaddingLeft: =20
                  PaddingRight: =20
                  PaddingTop: =4
                  RadiusBottomLeft: =0
                  RadiusBottomRight: =0
                  RadiusTopLeft: =0
                  RadiusTopRight: =0
                  Visible: =gGRDelegationMode = "I will receive"
                  Width: =Parent.Width
                Children:
                  - chkGR2:
                      Control: CheckBox@0.0.30
                      Properties:
                        Width: =32
                  - lblChkGR2:
                      Control: Label@2.5.1
                      Properties:
                        AlignInContainer: =AlignInContainer.Center
                        Height: =24
                        PaddingLeft: =0
                        PaddingRight: =0
                        Size: =11
                        Text: ="Items checked against approved order / delivery documents"
                        Width: =Parent.Width - 60
            - rowCheckGR3:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  DropShadow: =DropShadow.None
                  FillPortions: =0
                  Height: =40
                  LayoutDirection: =LayoutDirection.Horizontal
                  LayoutGap: =8
                  PaddingBottom: =4
                  PaddingLeft: =20
                  PaddingRight: =20
                  PaddingTop: =4
                  RadiusBottomLeft: =0
                  RadiusBottomRight: =0
                  RadiusTopLeft: =0
                  RadiusTopRight: =0
                  Visible: =gGRDelegationMode = "I will receive"
                  Width: =Parent.Width
                Children:
                  - chkGR3:
                      Control: CheckBox@0.0.30
                      Properties:
                        Width: =32
                  - lblChkGR3:
                      Control: Label@2.5.1
                      Properties:
                        AlignInContainer: =AlignInContainer.Center
                        Height: =24
                        PaddingLeft: =0
                        PaddingRight: =0
                        Size: =11
                        Text: ="Quantity and condition verified"
                        Width: =Parent.Width - 60
            - rowCheckGR4:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  DropShadow: =DropShadow.None
                  FillPortions: =0
                  Height: =40
                  LayoutDirection: =LayoutDirection.Horizontal
                  LayoutGap: =8
                  PaddingBottom: =4
                  PaddingLeft: =20
                  PaddingRight: =20
                  PaddingTop: =4
                  RadiusBottomLeft: =0
                  RadiusBottomRight: =0
                  RadiusTopLeft: =0
                  RadiusTopRight: =0
                  Visible: =gGRDelegationMode = "I will receive"
                  Width: =Parent.Width
                Children:
                  - chkGR4:
                      Control: CheckBox@0.0.30
                      Properties:
                        Width: =32
                  - lblChkGR4:
                      Control: Label@2.5.1
                      Properties:
                        AlignInContainer: =AlignInContainer.Center
                        Height: =24
                        PaddingLeft: =0
                        PaddingRight: =0
                        Size: =11
                        Text: ="Requester acceptance confirmed"
                        Width: =Parent.Width - 60
            - rowCheckGR5:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  DropShadow: =DropShadow.None
                  FillPortions: =0
                  Height: =40
                  LayoutDirection: =LayoutDirection.Horizontal
                  LayoutGap: =8
                  PaddingBottom: =4
                  PaddingLeft: =20
                  PaddingRight: =20
                  PaddingTop: =4
                  RadiusBottomLeft: =0
                  RadiusBottomRight: =0
                  RadiusTopLeft: =0
                  RadiusTopRight: =0
                  Visible: =gGRDelegationMode = "I will receive"
                  Width: =Parent.Width
                Children:
                  - chkGR5:
                      Control: CheckBox@0.0.30
                      Properties:
                        Width: =32
                  - lblChkGR5:
                      Control: Label@2.5.1
                      Properties:
                        AlignInContainer: =AlignInContainer.Center
                        Height: =24
                        PaddingLeft: =0
                        PaddingRight: =0
                        Size: =11
                        Text: ="Damaged or incorrect items reported to Procurement (if applicable)"
                        Width: =Parent.Width - 60
            - rowLineItemsGR:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  DropShadow: =DropShadow.None
                  FillPortions: =0
                  Height: =40 + 36 + 4 + CountRows(colLineItemsDetail) * 56 + 8 + 60
                  LayoutDirection: =LayoutDirection.Vertical
                  LayoutGap: =4
                  PaddingBottom: =8
                  PaddingLeft: =20
                  PaddingRight: =20
                  PaddingTop: =16
                  RadiusBottomLeft: =0
                  RadiusBottomRight: =0
                  RadiusTopLeft: =0
                  RadiusTopRight: =0
                  Width: =Parent.Width
                Children:
                  - lblLineItemsHeaderGR:
                      Control: Label@2.5.1
                      Properties:
                        FontWeight: =FontWeight.Bold
                        Height: =24
                        Size: =12
                        Text: ="Raw Material Receipt Details *"
                        Width: =Parent.Width
                  - lblLineItemsNoteGR:
                      Control: Label@2.5.1
                      Properties:
                        Color: =RGBA(133, 79, 11, 1)
                        PaddingTop: =0
                        Size: =10
                        Text: ="Enter actual received quantity, batch number, expiry date, QC number, RM/PK code and Link to COA for each item"
                        Width: =Parent.Width
                  - rowLineItemsColHeaderGR:
                      Control: GroupContainer@1.5.0
                      Variant: AutoLayout
                      Properties:
                        DropShadow: =DropShadow.None
                        Fill: =RGBA(225, 223, 214, 1)
                        FillPortions: =0
                        Height: =36
                        LayoutAlignItems: =LayoutAlignItems.Center
                        LayoutDirection: =LayoutDirection.Horizontal
                        LayoutGap: =8
                        PaddingLeft: =8
                        PaddingRight: =8
                        RadiusBottomLeft: =0
                        RadiusBottomRight: =0
                        Width: =Parent.Width
                      Children:
                        - lblGRColName:
                            Control: Label@2.5.1
                            Properties:
                              Color: =RGBA(68, 68, 65, 1)
                              FillPortions: =1
                              FontWeight: =FontWeight.Semibold
                              Height: =36
                              Size: =9
                              Text: ="Trade Name"
                              Width: =Parent.Width * 0.19
                        - lblGRColUnit:
                            Control: Label@2.5.1
                            Properties:
                              Color: =RGBA(68, 68, 65, 1)
                              FontWeight: =FontWeight.Semibold
                              Height: =36
                              Size: =9
                              Text: ="Unit"
                              Width: =Parent.Width * 0.05
                        - lblGRColRecQty:
                            Control: Label@2.5.1
                            Properties:
                              Align: =Align.Center
                              Color: =RGBA(68, 68, 65, 1)
                              FontWeight: =FontWeight.Semibold
                              Height: =36
                              Size: =9
                              Text: ="Received Quantity *"
                              Width: =Parent.Width * 0.1
                        - lblGRColBatch:
                            Control: Label@2.5.1
                            Properties:
                              Color: =RGBA(68, 68, 65, 1)
                              FontWeight: =FontWeight.Semibold
                              Height: =36
                              Size: =9
                              Text: ="Batch No *"
                              Width: =Parent.Width * 0.11
                        - lblGRColExp:
                            Control: Label@2.5.1
                            Properties:
                              Color: =RGBA(68, 68, 65, 1)
                              FontWeight: =FontWeight.Semibold
                              Height: =36
                              Size: =9
                              Text: ="Expiry Date *"
                              Width: =Parent.Width * 0.11
                        - lblGRColQC:
                            Control: Label@2.5.1
                            Properties:
                              Color: =RGBA(68, 68, 65, 1)
                              FontWeight: =FontWeight.Semibold
                              Height: =36
                              Size: =9
                              Text: ="QC Number *"
                              Width: =Parent.Width * 0.1
                        - lblGRColRMPK:
                            Control: Label@2.5.1
                            Properties:
                              Color: =RGBA(68, 68, 65, 1)
                              FontWeight: =FontWeight.Semibold
                              Height: =36
                              Size: =9
                              Text: ="RM/PK Code *"
                              Width: =Parent.Width * 0.1
                        - lblGRColCOA:
                            Control: Label@2.5.1
                            Properties:
                              Color: =RGBA(68, 68, 65, 1)
                              FontWeight: =FontWeight.Semibold
                              Height: =36
                              Size: =9
                              Text: ="Link to COA *"
                              Width: =Parent.Width * 0.15
                  - galLineItemsGR:
                      Control: Gallery@2.15.0
                      Variant: BrowseLayout_Vertical_TwoTextOneImageVariant_ver5.0
                      Properties:
                        FillPortions: =0
                        Height: =CountRows(colLineItemsDetail) * 56 + 12
                        Items: =colLineItemsDetail
                        ShowScrollbar: =false
                        TemplatePadding: =4
                        TemplateSize: =56
                        Width: =Parent.Width
                      Children:
                        - rowGRItem:
                            Control: GroupContainer@1.5.0
                            Variant: AutoLayout
                            Properties:
                              DropShadow: =DropShadow.None
                              Fill: =If(Mod(ThisItem.ID, 2) = 0, RGBA(248, 247, 243, 1), RGBA(255, 255, 255, 1))
                              Height: =56
                              LayoutAlignItems: =LayoutAlignItems.Center
                              LayoutDirection: =LayoutDirection.Horizontal
                              LayoutGap: =8
                              PaddingLeft: =8
                              PaddingRight: =8
                              RadiusBottomLeft: =0
                              RadiusBottomRight: =0
                              RadiusTopLeft: =0
                              RadiusTopRight: =0
                              Width: =Parent.Width
                            Children:
                              - colGRName:
                                  Control: GroupContainer@1.5.0
                                  Variant: AutoLayout
                                  Properties:
                                    DropShadow: =DropShadow.None
                                    LayoutDirection: =LayoutDirection.Vertical
                                    LayoutGap: =2
                                    RadiusBottomLeft: =0
                                    RadiusBottomRight: =0
                                    RadiusTopLeft: =0
                                    RadiusTopRight: =0
                                    Width: =Parent.Width * 0.19
                                  Children:
                                    - lblGRItemName:
                                        Control: Label@2.5.1
                                        Properties:
                                          Height: =20
                                          Size: =11
                                          Text: =ThisItem.MaterialName
                                          Width: =Parent.Width
                                          Wrap: =false
                                    - lblGRItemSubtitle:
                                        Control: Label@2.5.1
                                        Properties:
                                          Color: =RGBA(136, 135, 128, 1)
                                          Height: =16
                                          Size: =8
                                          Text: |-
                                            =With({wMat: LookUp('Raw Materials', ID = ThisItem.MaterialID.Id)}, If(IsBlank(wMat), "", wMat.Category & " · " & wMat.Supplier))
                                          Width: =Parent.Width
                                          Wrap: =false
                              - lblGRItemUnit:
                                  Control: Label@2.5.1
                                  Properties:
                                    Color: =RGBA(136, 135, 128, 1)
                                    Size: =11
                                    Text: =ThisItem.Unit
                                    Width: =Parent.Width * 0.05
                              - txtGRRecQty:
                                  Control: TextInput@0.0.54
                                  Properties:
                                    Align: =Align.Center
                                    Height: =40
                                    OnChange: |-
                                      =UpdateIf(colLineItemsDetail, ID = ThisItem.ID, {ReceivedQty1: Value(Self.Value)})
                                    Placeholder: ="0"
                                    Value: =If(IsBlank(ThisItem.ReceivedQty1) || ThisItem.ReceivedQty1 = 0, "", Text(ThisItem.ReceivedQty1))
                                    Width: =Parent.Width * 0.1
                              - txtGRBatch:
                                  Control: TextInput@0.0.54
                                  Properties:
                                    Height: =40
                                    OnChange: |-
                                      =UpdateIf(colLineItemsDetail, ID = ThisItem.ID, {BatchNumber1: Self.Value})
                                    Placeholder: ="Batch no."
                                    Value: =If(IsBlank(ThisItem.BatchNumber1), "", ThisItem.BatchNumber1)
                                    Width: =Parent.Width * 0.11
                              - dpGRExpiry:
                                  Control: ModernDatePicker@1.0.1
                                  Properties:
                                    BorderStyle: =""
                                    DefaultDate: =ThisItem.ExpiryDate1
                                    Font: =""
                                    FontWeight: =""
                                    Height: =40
                                    OnChange: |-
                                      =UpdateIf(colLineItemsDetail, ID = ThisItem.ID, {ExpiryDate1: Self.SelectedDate})
                                    Placeholder: ="Expiry date"
                                    Size: =0
                                    Width: =Parent.Width * 0.11
                              - txtGRQCNumber:
                                  Control: TextInput@0.0.54
                                  Properties:
                                    Height: =40
                                    OnChange: |-
                                      =UpdateIf(colLineItemsDetail, ID = ThisItem.ID, {QCNumber1: Self.Value})
                                    Placeholder: ="QC number"
                                    Value: =If(IsBlank(ThisItem.QCNumber1), "", ThisItem.QCNumber1)
                                    Width: =Parent.Width * 0.1
                              - txtGRRMPKCode:
                                  Control: TextInput@0.0.54
                                  Properties:
                                    Height: =40
                                    OnChange: |-
                                      =UpdateIf(colLineItemsDetail, ID = ThisItem.ID, {RMPKCode1: Self.Value})
