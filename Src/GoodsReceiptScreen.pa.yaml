                  - rowAcceptanceDecision_GR:
                      Control: GroupContainer@1.5.0
                      Variant: AutoLayout
                      Properties:
                        DropShadow: =DropShadow.None
                        LayoutDirection: =LayoutDirection.Vertical
                        LayoutGap: =4
                        RadiusBottomLeft: =0
                        RadiusBottomRight: =0
                        RadiusTopLeft: =0
                        RadiusTopRight: =0
                        Width: =Parent.Width
                        X: =40
                        Y: =40
                      Children:
                        - lblAcceptanceDecisionLabel_GR:
                            Control: Label@2.5.1
                            Properties:
                              FontWeight: =FontWeight.Semibold
                              Height: =24
                              Size: =11
                              Text: ="Acceptance Decision *"
                              Width: =Parent.Width - 40
                        - ddAcceptanceDecision_GR:
                            Control: ComboBox@0.0.51
                            Properties:
                              Height: =40
                              InputTextPlaceholder: ="Choose an option"
                              Items: =Choices('RM Procurement Requests'.GoodsAcceptanceDecision)
                              Width: =Parent.Width
            - rowRemarks_GR:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  DropShadow: =DropShadow.None
                  LayoutDirection: =LayoutDirection.Vertical
                  LayoutGap: =4
                  LayoutMinHeight: =160
                  PaddingBottom: =8
                  PaddingLeft: =20
                  PaddingRight: =20
                  PaddingTop: =8
                  RadiusBottomLeft: =0
                  RadiusBottomRight: =0
                  RadiusTopLeft: =0
                  RadiusTopRight: =0
                  Visible: =gGRDelegationMode = "I will receive"
                  Width: =Parent.Width
                Children:
                  - lblRemarksLabel_GR:
                      Control: Label@2.5.1
                      Properties:
                        FontWeight: =FontWeight.Semibold
                        Height: =24
                        Size: =11
                        Text: ="Remarks *"
                        Width: =Parent.Width - 40
                  - lblRemarksHint_GR:
                      Control: Label@2.5.1
                      Properties:
                        Color: =RGBA(136, 135, 128, 1)
                        Height: =20
                        Size: =10
                        Text: ="Describe receipt issues, missing or damaged items, or notes for Procurement team"
                        Width: =Parent.Width - 40
                  - txtRemarks_GR:
                      Control: TextInput@0.0.54
                      Properties:
                        Height: =80
                        Mode: ='TextInputCanvas.Mode'.Multiline
                        Placeholder: ="Enter remarks here..."
                        Width: =Parent.Width - 40
            - rowfrmGRLog_GR:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  DropShadow: =DropShadow.None
                  FillPortions: =0
                  LayoutDirection: =LayoutDirection.Vertical
                  LayoutGap: =4
                  LayoutMinHeight: =160
                  PaddingBottom: =8
                  PaddingLeft: =20
                  PaddingRight: =20
                  PaddingTop: =8
                  RadiusBottomLeft: =0
                  RadiusBottomRight: =0
                  RadiusTopLeft: =0
                  RadiusTopRight: =0
                  Visible: =gGRDelegationMode = "I will receive"
                  Width: =Parent.Width
                  X: =40
                  Y: =40
                Children:
                  - frmGRLog_GR:
                      Control: Form@2.4.4
                      Layout: Vertical
                      Properties:
                        BorderStyle: =BorderStyle.None
                        DataSource: ='RM Procurement Execution Log'
                        Height: =140
                        Item: =gGRLogEntry
                        LayoutMinHeight: =200
                        OnFailure: |-
                          =Notify("Goods receipt saved, but photo upload failed. Please contact IT with reference: " & gSelectedRequest.Title, NotificationType.Warning)
                        SnapToColumns: =false
                        Visible: =gGRDelegationMode = "I will receive"
                        Width: =Parent.Width
                        X: =40
                        Y: =40
                      Children:
                        - GRAttachments_DataCard:
                            Control: TypedDataCard@1.0.7
                            Variant: ClassicAttachmentsEdit
                            Properties:
                              DataField: ="{Attachments}"
                              Default: =ThisItem.Attachments
                              DisplayName: ="Receipt Photos"
                              Height: =200
                              Required: =false
                              Update: =attGRPhotos.Attachments
                              Width: =Parent.Width
                              X: =0
                              Y: =0
                            Children:
                              - DataCardKeyGRPhotos:
                                  Control: Label@2.5.1
                                  MetadataKey: FieldName
                                  Properties:
                                    FontWeight: =FontWeight.Semibold
                                    Height: =24
                                    PaddingLeft: =0
                                    PaddingRight: =0
                                    Size: =11
                                    Text: ="Receipt Photos *"
                                    Width: =Parent.Width
                                    Y: =8
                              - attGRPhotos:
                                  Control: Attachments@2.3.0
                                  MetadataKey: FieldValue
                                  Properties:
                                    Height: =140
                                    Items: =If(IsBlank(Parent.Default), gGRPendingAttachments, Parent.Default)
                                    MaxAttachments: =5
                                    PaddingLeft: =20
                                    PaddingRight: =20
                                    Width: =Parent.Width
                                    Y: =DataCardKeyGRPhotos.Y + DataCardKeyGRPhotos.Height + 4
                              - ErrorMessageGRPhotos:
                                  Control: Label@2.5.1
                                  MetadataKey: ErrorMessage
                                  Properties:
                                    Color: =RGBA(168, 0, 0, 1)
                                    Height: =20
                                    PaddingLeft: =20
                                    Size: =11
                                    Text: =Parent.Error
                                    Visible: =Parent.DisplayMode = DisplayMode.Edit
                                    Width: =Parent.Width
                                    Y: =attGRPhotos.Y + attGRPhotos.Height
      - conActionBar_GR:
          Control: GroupContainer@1.5.0
          Variant: AutoLayout
          Properties:
            DropShadow: =DropShadow.None
            Fill: =RGBA(255, 255, 255, 1)
            Height: =60
            LayoutAlignItems: =LayoutAlignItems.Center
            LayoutDirection: =LayoutDirection.Horizontal
            LayoutGap: =12
            LayoutJustifyContent: =LayoutJustifyContent.SpaceBetween
            PaddingBottom: =8
            PaddingLeft: =20
            PaddingRight: =20
            PaddingTop: =8
            RadiusBottomLeft: =0
            RadiusBottomRight: =0
            RadiusTopLeft: =0
            RadiusTopRight: =0
            Width: =Parent.Width
            Y: =Parent.Height - 60
          Children:
            - btnBack_GR:
                Control: Button@0.0.45
                Properties:
                  Height: =36
                  OnSelect: =Navigate(RequestDetailScreen)
                  Text: ="← Back"
                  Width: =100
                  X: =Parent.Width - 120
                  Y: =40
            - conActionBarBtn_GR:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  AlignInContainer: =AlignInContainer.SetByContainer
                  DropShadow: =DropShadow.None
                  Height: =36
                  LayoutAlignItems: =LayoutAlignItems.Center
                  LayoutDirection: =LayoutDirection.Horizontal
                  LayoutGap: =10
                  LayoutJustifyContent: =LayoutJustifyContent.End
                  LayoutMinHeight: =16
                  LayoutMinWidth: =16
                  RadiusBottomLeft: =0
                  RadiusBottomRight: =0
                  RadiusTopLeft: =0
                  RadiusTopRight: =0
                Children:
                  - btnCancel_GR:
                      Control: Button@0.0.45
                      Properties:
                        Height: =36
                        OnSelect: =Navigate(HomeScreen)
                        Text: ="Cancel"
                        Width: =120
                        X: =40
                        Y: =40
                  - btnSaveAssignment_GR:
                      Control: Button@0.0.45
                      Properties:
                        Height: =44
                        OnSelect: |-
                          =If(
                              IsBlank(ddAssignReceiver_GR.Selected.Title),
                              Notify("Please select a person to assign", NotificationType.Error),
                              If(
                                  Not(IsBlank(gSelectedRequest.GRAssignedToID)) &&
                                  gSelectedRequest.GRAssignedToID.Id <> ddAssignReceiver_GR.Selected.ID,
                                  Procurement_Notify_Receipt_Assignee.Run(
                                      LookUp('Employee List', ID = gSelectedRequest.GRAssignedToID.Id).email,
                                      gSelectedRequest.GRAssignedToID.Value,
                                      gSelectedRequest.Title,
                                      gSelectedRequest.ID,
                                      "Unassigned",
                                      Text(gSelectedRequest.RequiredDeliveryDate, "dd/mm/yyyy"),
                                      ""
                                  )
                              );
                              With(
                                  {wPatched: Patch('RM Procurement Requests', LookUp('RM Procurement Requests', ID = gSelectedRequest.ID), {GRAssignedToID: {Id: ddAssignReceiver_GR.Selected.ID, Value: ddAssignReceiver_GR.Selected.Title}})},
                                  If(
                                      IsBlank(wPatched.ID),
                                      Notify("Failed to save assignment. Please try again.", NotificationType.Error),
                                      Set(gSelectedRequest, wPatched);
                                      Procurement_Notify_Receipt_Assignee.Run(
                                          ddAssignReceiver_GR.Selected.email,
                                          ddAssignReceiver_GR.Selected.Title,
                                          gSelectedRequest.Title,
                                          gSelectedRequest.ID,
                                          "GoodsReceipt",
                                          Text(gSelectedRequest.RequiredDeliveryDate, "dd/mm/yyyy"),
                                          ""
                                      );
                                      Notify("Assignment saved to " & ddAssignReceiver_GR.Selected.Title, NotificationType.Success)
                                  )
                              )
                          )
                        Text: ="Save Assignment"
                        Visible: =gGRDelegationMode = "Assign to someone else"
                        Width: =160
                        X: =40
                        Y: =40
                  - btnSubmit_GR:
                      Control: Button@0.0.45
                      Properties:
                        Height: =36
                        OnSelect: |-
                          =With(
                              {wLatest: LookUp('RM Procurement Requests', ID = gSelectedRequest.ID)},
                              If(
                                  Not(
                                  wLatest.RequesterEmail = gCurrentEmployee.Email && IsBlank(wLatest.GRAssignedToID)
                                  || Not(IsBlank(wLatest.GRAssignedToID)) && wLatest.GRAssignedToID.Id = gCurrentEmployee.ID
                              ),
                                  Notify("This assignment has been reassigned to someone else. Your submission has been cancelled.", NotificationType.Warning);
                                  Navigate(HomeScreen),
                                  If(
                                      Not(chkGR1.Checked && chkGR2.Checked && chkGR3.Checked && chkGR4.Checked && chkGR5.Checked),
                                      Notify("Please complete all checklist items", NotificationType.Error),
                                      If(
                                          IsBlank(dpReceiptDate_GR.SelectedDate) ||
                                          IsBlank(ddReceiptStatus_GR.Selected.Value) ||
                                          IsBlank(ddAcceptanceDecision_GR.Selected.Value) ||
                                          IsBlank(txtRemarks_GR.Value) ||
                                          CountRows(attGRPhotos.Attachments) = 0,
                                          Notify("Please fill in all required fields", NotificationType.Error),
                                          If(
                                          ddAcceptanceDecision_GR.Selected.Value <> "Rejected" && CountRows(Filter(colLineItemsDetail, ReceivedQty1 > 0)) = 0,
                                          Notify("Please enter received quantity for at least one material", NotificationType.Error),
                                          If(
                                          CountRows(Filter(colLineItemsDetail, ReceivedQty1 > 0 && IsBlank(BatchNumber1))) > 0,
                                          Notify("Please enter batch number for all received materials", NotificationType.Error),
                                          If(
                                          CountRows(Filter(colLineItemsDetail, ReceivedQty1 > 0 && IsBlank(ExpiryDate1))) > 0,
                                          Notify("Please enter expiry date for all received materials", NotificationType.Error),
                                          If(
                                          CountRows(Filter(colLineItemsDetail, ReceivedQty1 > 0 && IsBlank(QCNumber1))) > 0,
                                          Notify("Please enter QC number for all received materials", NotificationType.Error),
                                          If(
                                          CountRows(Filter(colLineItemsDetail, ReceivedQty1 > 0 && IsBlank(RMPKCode1))) > 0,
                                          Notify("Please enter RM/PK code for all received materials", NotificationType.Error),
                                          If(
                                          CountRows(Filter(colLineItemsDetail, ReceivedQty1 > 0 && IsBlank(COALink1))) > 0,
                                          Notify("Please enter Link to COA for all received materials", NotificationType.Error),
                                          With(
                                              {
                                                  wPatched: Patch(
                                                      'RM Procurement Requests',
                                                      gSelectedRequest,
                                                      {
                                                          Status: {Value: Switch(
                                                              ddAcceptanceDecision_GR.Selected.Value,
                                                              "Accepted",                    If(!wLatest.InvoiceSubmitted, "Pending Invoice", "Pending Accounting"),
                                                              "Rejected",                    "Rejected",
                                                              "Requires Supplier Follow-up", "Pending Supplier Follow-up"
                                                          )},
                                                          GoodsReceiptBy: gCurrentEmployee.Title,
                                                          GoodsReceiptDate: dpReceiptDate_GR.SelectedDate,
                                                          GoodsReceiptStatus: {Value: ddReceiptStatus_GR.Selected.Value},
                                                          GoodsAcceptanceDecision: {Value: ddAcceptanceDecision_GR.Selected.Value},
                                                          GoodsReceiptRemarks: txtRemarks_GR.Value,
                                                          GoodsReceiptAt: Now()
                                                      }
                                                  )
                                              },
                                              If(
                                                  IsBlank(wPatched.ID),
                                                  Notify("Failed to submit. Please try again.", NotificationType.Error),
                                                  With(
                                                      {wLog: Patch(
                                                          'RM Procurement Execution Log',
                                                          Defaults('RM Procurement Execution Log'),
                                                          {
                                                              Title: "Step 3 - Goods Receipt - " & gSelectedRequest.Title,
                                                              RequestID: {Id: gSelectedRequest.ID, Value: gSelectedRequest.Title},
                                                              RequestIDText: Text(gSelectedRequest.ID),
                                                              StepNumber: 3,
                                                              StepName: {Value: "Goods Receipt & Acceptance"},
                                                              ExecutedBy: {Id: gCurrentEmployee.ID, Value: gCurrentEmployee.Title},
                                                              ExecutedAt: Now(),
                                                              Notes: txtRemarks_GR.Value
                                                          }
                                                      )},
                                                      If(
                                                          IsBlank(wLog.ID),
                                                          Notify("Failed to save execution log. Please try again.", NotificationType.Error),
                                                          Set(gGRPendingAttachments, attGRPhotos.Attachments);
                                                          Set(gGRLogEntry, wLog);
                                                          EditForm(frmGRLog_GR);
                                                          SubmitForm(frmGRLog_GR);
                                                          ForAll(
                                                              colLineItemsDetail,
                                                              Patch(
                                                                  'RM Procurement Line Items',
                                                                  {ID: ThisRecord.ID},
                                                                  {
                                                                      ReceivedQty1: ThisRecord.ReceivedQty1,
                                                                      BatchNumber1: If(ThisRecord.ReceivedQty1 > 0, ThisRecord.BatchNumber1, ""),
                                                                      ExpiryDate1: If(ThisRecord.ReceivedQty1 > 0, ThisRecord.ExpiryDate1, Blank()),
                                                                      QCNumber1: If(ThisRecord.ReceivedQty1 > 0, ThisRecord.QCNumber1, ""),
                                                                      RMPKCode1: If(ThisRecord.ReceivedQty1 > 0, ThisRecord.RMPKCode1, ""),
                                                                      COALink1: If(ThisRecord.ReceivedQty1 > 0, ThisRecord.COALink1, "")
                                                                  }
                                                              )
                                                          );
                                                          Switch(
                                                              ddAcceptanceDecision_GR.Selected.Value,
                                                              "Accepted",                    Notify("Goods receipt submitted. Request is now " & If(!wLatest.InvoiceSubmitted, "Pending Invoice.", "Pending Accounting."), NotificationType.Success),
                                                              "Rejected",                    Notify("Goods receipt submitted. Request is now Rejected.", NotificationType.Success),
                                                              "Requires Supplier Follow-up", Notify("Goods receipt submitted. Request is pending Supplier Follow-up.", NotificationType.Success)
                                                          );
                                                          Navigate(HomeScreen)
                                                      )
                                                  )
                                              )
                                          )
                                          )
                                          )
                                          )
                                          )
                                          )
                                          )
                                      )
                                  )
                              )
                          )
                        Text: ="Submit →"
                        Visible: =gGRDelegationMode = "I will receive"
                        Width: =160
                        X: =40
                        Y: =40
      - lblUserInfo_PE_1:
          Control: Label@2.5.1
          Properties:
            Align: =Align.Right
            Color: =RGBA(255, 255, 255, 1)
            FontWeight: =FontWeight.Semibold
            Height: =60
            Size: =12
            Text: |-
              =If(
                  IsBlank(gCurrentUser.Role.Value),
                  gCurrentEmployee.Title,
                  gCurrentEmployee.Title & " | " & gCurrentUser.Role.Value
              )
            Width: =280
            X: =Parent.Width - 300
