Screens:
  HomeScreen:
    Properties:
      LoadingSpinnerColor: =RGBA(56, 96, 178, 1)
      OnVisible: =Set(gStatusFilter, Blank())
    Children:
      - lblNoRole:
          Control: Label@2.5.1
          Properties:
            Align: =Align.Center
            Color: =If(gAppReady, RGBA(163, 45, 45, 1), RGBA(136, 135, 128, 1))
            Fill: =If(gAppReady, RGBA(252, 235, 235, 1), RGBA(255, 255, 255, 1))
            Height: =Parent.Height - 60
            Size: =12
            Text: =If(gAppReady, "⚠ Your account was not found in the system. Please contact your administrator.", "Checking your account...")
            Visible: =Not(gAppReady) || IsBlank(gCurrentEmployee.ID) || IsBlank(gCurrentUser.ID)
            Width: =Parent.Width
            Y: =60
      - rectHeader:
          Control: Rectangle@2.3.0
          Properties:
            Fill: =RGBA(83, 74, 183, 1)
            Height: =60
            Width: =Parent.Width
      - lblAppTitle:
          Control: Label@2.5.1
          Properties:
            Color: =RGBA(255, 255, 255, 1)
            FontWeight: =FontWeight.Bold
            Height: =60
            Size: =14
            Text: ="Max Biocare Procurement"
            Width: =400
            X: =20
      - lblUserInfo:
          Control: Label@2.5.1
          Properties:
            Align: =Align.Right
            Color: =RGBA(255, 255, 255, 1)
            FontWeight: =FontWeight.Semibold
            Height: =60
            Size: =12
            Text: |-
              =If(
                  IsBlank(gCurrentUser.Role.Value),
                  gCurrentEmployee.Title,
                  gCurrentEmployee.Title & " | " & gCurrentUser.Role.Value
              )
            Width: =280
            X: =Parent.Width - 300
      - rowToolbar:
          Control: GroupContainer@1.5.0
          Variant: AutoLayout
          Properties:
            DropShadow: =DropShadow.None
            Height: =80
            LayoutDirection: =LayoutDirection.Horizontal
            LayoutGap: =10
            LayoutJustifyContent: =LayoutJustifyContent.SpaceBetween
            PaddingBottom: =20
            PaddingLeft: =20
            PaddingRight: =20
            PaddingTop: =20
            RadiusBottomLeft: =0
            RadiusBottomRight: =0
            RadiusTopLeft: =0
            RadiusTopRight: =0
            Visible: =Not(IsBlank(gCurrentEmployee.ID)) && Not(IsBlank(gCurrentUser.ID))
            Width: =Parent.Width
            Y: =60
          Children:
            - lblSectionTitle:
                Control: Label@2.5.1
                Properties:
                  FillPortions: =1
                  FontWeight: =FontWeight.Bold
                  Size: =14
                  Text: |-
                    =Switch(gCurrentUser.Role.Value,
                        "Manager",     "My Requests",
                        "Admin",       "All Requests",
                        "Executive",   "All Requests",
                        "Procurement", "Procurement Requests",
                        "Accounting",  "Accounting Requests",
                        "My Requests"
                    )
                  Width: =400
            - btnNewRequest:
                Control: Button@0.0.45
                Properties:
                  Height: =36
                  Icon: ="Add"
                  OnSelect: =Navigate(RequestFormScreen)
                  Text: ="New Request"
                  Width: =150
      - rowFilterBar:
          Control: GroupContainer@1.5.0
          Variant: AutoLayout
          Properties:
            DropShadow: =DropShadow.None
            Fill: =RGBA(255, 255, 255, 1)
            Height: =48
            LayoutAlignItems: =LayoutAlignItems.Center
            LayoutDirection: =LayoutDirection.Horizontal
            LayoutOverflowX: =LayoutOverflow.Scroll
            PaddingBottom: =12
            PaddingLeft: =20
            PaddingRight: =20
            PaddingTop: =12
            RadiusBottomLeft: =0
            RadiusBottomRight: =0
            RadiusTopLeft: =0
            RadiusTopRight: =0
            Visible: =Not(IsBlank(gCurrentEmployee.ID)) && Not(IsBlank(gCurrentUser.ID))
            Width: =Parent.Width
            Y: =140
          Children:
            - lblFilterAll:
                Control: Label@2.5.1
                Properties:
                  Align: =Align.Center
                  Color: =If(IsBlank(gStatusFilter), RGBA(83, 74, 183, 1), RGBA(136, 135, 128, 1))
                  Fill: =If(IsBlank(gStatusFilter), RGBA(237, 235, 254, 1), RGBA(0, 0, 0, 0))
                  FontWeight: =If(IsBlank(gStatusFilter), FontWeight.Bold, FontWeight.Semibold)
                  Height: =24
                  HoverColor: =RGBA(83, 74, 183, 1)
                  OnSelect: =Set(gStatusFilter, Blank())
                  PaddingLeft: =8
                  PaddingRight: =8
                  Size: =11
                  Text: ="All"
                  Width: =50
            - divFilter1:
                Control: Rectangle@2.3.0
                Properties:
                  BorderColor: =RGBA(0, 0, 0, 0)
                  Fill: =RGBA(210, 209, 199, 1)
                  Height: =16
                  Width: =1
            - lblFilterPendingManager:
                Control: Label@2.5.1
                Properties:
                  Align: =Align.Center
                  Color: =If(gStatusFilter = "Pending Manager", RGBA(83, 74, 183, 1), RGBA(136, 135, 128, 1))
                  Fill: =If(gStatusFilter = "Pending Manager", RGBA(237, 235, 254, 1), RGBA(0, 0, 0, 0))
                  FontWeight: =If(gStatusFilter = "Pending Manager", FontWeight.Bold, FontWeight.Semibold)
                  Height: =24
                  HoverColor: =RGBA(83, 74, 183, 1)
                  OnSelect: =Set(gStatusFilter, "Pending Manager")
                  PaddingLeft: =8
                  PaddingRight: =8
                  Size: =11
                  Text: ="Pending Manager"
                  Width: =140
            - divFilter2:
                Control: Rectangle@2.3.0
                Properties:
                  BorderColor: =RGBA(0, 0, 0, 0)
                  Fill: =RGBA(210, 209, 199, 1)
                  Height: =16
                  Width: =1
            - lblFilterPendingExec:
                Control: Label@2.5.1
                Properties:
                  Align: =Align.Center
                  Color: =If(gStatusFilter = "Pending Executive", RGBA(83, 74, 183, 1), RGBA(136, 135, 128, 1))
                  Fill: =If(gStatusFilter = "Pending Executive", RGBA(237, 235, 254, 1), RGBA(0, 0, 0, 0))
                  FontWeight: =If(gStatusFilter = "Pending Executive", FontWeight.Bold, FontWeight.Semibold)
                  Height: =24
                  HoverColor: =RGBA(83, 74, 183, 1)
                  OnSelect: =Set(gStatusFilter, "Pending Executive")
                  PaddingLeft: =8
                  PaddingRight: =8
                  Size: =11
                  Text: ="Pending Executive"
            - divFilter3:
                Control: Rectangle@2.3.0
                Properties:
                  BorderColor: =RGBA(0, 0, 0, 0)
                  Fill: =RGBA(210, 209, 199, 1)
                  Height: =16
                  Width: =1
            - lblFilterPendingProcurement:
                Control: Label@2.5.1
                Properties:
                  Align: =Align.Center
                  Color: =If(gStatusFilter = "Pending Procurement", RGBA(83, 74, 183, 1), RGBA(136, 135, 128, 1))
                  Fill: =If(gStatusFilter = "Pending Procurement", RGBA(237, 235, 254, 1), RGBA(0, 0, 0, 0))
                  FontWeight: =If(gStatusFilter = "Pending Procurement", FontWeight.Bold, FontWeight.Semibold)
                  Height: =24
                  HoverColor: =RGBA(83, 74, 183, 1)
                  OnSelect: =Set(gStatusFilter, "Pending Procurement")
                  PaddingLeft: =8
                  PaddingRight: =8
                  Size: =11
                  Text: ="Pending Procurement"
                  Width: =170
            - divFilter4:
                Control: Rectangle@2.3.0
                Properties:
                  BorderColor: =RGBA(0, 0, 0, 0)
                  Fill: =RGBA(210, 209, 199, 1)
                  Height: =16
                  Width: =1
            - lblFilterPendingAccounting:
                Control: Label@2.5.1
                Properties:
                  Align: =Align.Center
                  Color: =If(gStatusFilter = "Pending Accounting", RGBA(83, 74, 183, 1), RGBA(136, 135, 128, 1))
                  Fill: =If(gStatusFilter = "Pending Accounting", RGBA(237, 235, 254, 1), RGBA(0, 0, 0, 0))
                  FontWeight: =If(gStatusFilter = "Pending Accounting", FontWeight.Bold, FontWeight.Semibold)
                  Height: =24
                  HoverColor: =RGBA(83, 74, 183, 1)
                  OnSelect: =Set(gStatusFilter, "Pending Accounting")
                  PaddingLeft: =8
                  PaddingRight: =8
                  Size: =11
                  Text: ="Pending Accounting"
                  Width: =160
            - divFilter5:
                Control: Rectangle@2.3.0
                Properties:
                  BorderColor: =RGBA(0, 0, 0, 0)
                  Fill: =RGBA(210, 209, 199, 1)
                  Height: =16
                  Width: =1
            - lblFilterPendingInvoice:
                Control: Label@2.5.1
                Properties:
                  Align: =Align.Center
                  Color: =If(gStatusFilter = "Pending Invoice", RGBA(83, 74, 183, 1), RGBA(136, 135, 128, 1))
                  Fill: =If(gStatusFilter = "Pending Invoice", RGBA(237, 235, 254, 1), RGBA(0, 0, 0, 0))
                  FontWeight: =If(gStatusFilter = "Pending Invoice", FontWeight.Bold, FontWeight.Semibold)
                  Height: =24
                  HoverColor: =RGBA(83, 74, 183, 1)
                  OnSelect: =Set(gStatusFilter, "Pending Invoice")
                  PaddingLeft: =8
                  PaddingRight: =8
                  Size: =11
                  Text: ="Pending Invoice"
                  Width: =130
            - divFilter6:
                Control: Rectangle@2.3.0
                Properties:
                  BorderColor: =RGBA(0, 0, 0, 0)
                  Fill: =RGBA(210, 209, 199, 1)
                  Height: =16
                  Width: =1
            - lblFilterGoodsReceipt:
                Control: Label@2.5.1
                Properties:
                  Align: =Align.Center
                  Color: =If(gStatusFilter = "Goods Receipt & Acceptance", RGBA(83, 74, 183, 1), RGBA(136, 135, 128, 1))
                  Fill: =If(gStatusFilter = "Goods Receipt & Acceptance", RGBA(237, 235, 254, 1), RGBA(0, 0, 0, 0))
                  FontWeight: =If(gStatusFilter = "Goods Receipt & Acceptance", FontWeight.Bold, FontWeight.Semibold)
                  Height: =24
                  HoverColor: =RGBA(83, 74, 183, 1)
                  OnSelect: =Set(gStatusFilter, "Goods Receipt & Acceptance")
                  PaddingLeft: =8
                  PaddingRight: =8
                  Size: =11
                  Text: ="Goods Receipt"
                  Width: =120
            - divFilter7:
                Control: Rectangle@2.3.0
                Properties:
                  BorderColor: =RGBA(0, 0, 0, 0)
                  Fill: =RGBA(210, 209, 199, 1)
                  Height: =16
                  Width: =1
            - lblFilterSFU:
                Control: Label@2.5.1
                Properties:
                  Align: =Align.Center
                  Color: =If(gStatusFilter = "Pending Supplier Follow-up", RGBA(83, 74, 183, 1), RGBA(136, 135, 128, 1))
                  Fill: =If(gStatusFilter = "Pending Supplier Follow-up", RGBA(237, 235, 254, 1), RGBA(0, 0, 0, 0))
                  FontWeight: =If(gStatusFilter = "Pending Supplier Follow-up", FontWeight.Bold, FontWeight.Semibold)
                  Height: =24
                  HoverColor: =RGBA(83, 74, 183, 1)
                  OnSelect: =Set(gStatusFilter, "Pending Supplier Follow-up")
                  PaddingLeft: =8
                  PaddingRight: =8
                  Size: =11
                  Text: ="Supplier Follow-up"
            - divFilter8:
                Control: Rectangle@2.3.0
                Properties:
                  BorderColor: =RGBA(0, 0, 0, 0)
                  Fill: =RGBA(210, 209, 199, 1)
                  Height: =16
                  Width: =1
            - lblFilterCompleted:
                Control: Label@2.5.1
                Properties:
                  Align: =Align.Center
                  Color: =If(gStatusFilter = "Completed", RGBA(83, 74, 183, 1), RGBA(136, 135, 128, 1))
                  Fill: =If(gStatusFilter = "Completed", RGBA(237, 235, 254, 1), RGBA(0, 0, 0, 0))
                  FontWeight: =If(gStatusFilter = "Completed", FontWeight.Bold, FontWeight.Semibold)
                  Height: =24
                  HoverColor: =RGBA(83, 74, 183, 1)
                  OnSelect: =Set(gStatusFilter, "Completed")
                  PaddingLeft: =8
                  PaddingRight: =8
                  Size: =11
                  Text: ="Completed"
                  Width: =120
            - divFilter9:
                Control: Rectangle@2.3.0
                Properties:
                  BorderColor: =RGBA(0, 0, 0, 0)
                  Fill: =RGBA(210, 209, 199, 1)
                  Height: =16
                  Width: =1
            - lblFilterRejected:
                Control: Label@2.5.1
                Properties:
                  Align: =Align.Center
                  Color: =If(gStatusFilter = "Rejected", RGBA(83, 74, 183, 1), RGBA(136, 135, 128, 1))
                  Fill: =If(gStatusFilter = "Rejected", RGBA(237, 235, 254, 1), RGBA(0, 0, 0, 0))
                  FontWeight: =If(gStatusFilter = "Rejected", FontWeight.Bold, FontWeight.Semibold)
                  Height: =24
                  HoverColor: =RGBA(83, 74, 183, 1)
                  OnSelect: =Set(gStatusFilter, "Rejected")
                  PaddingLeft: =8
                  PaddingRight: =8
                  Size: =11
                  Text: ="Rejected"
                  Width: =120
      - rectFilterBarBorder:
          Control: Rectangle@2.3.0
          Properties:
            BorderColor: =RGBA(0, 0, 0, 0)
            Fill: =RGBA(210, 209, 199, 1)
            Height: =1
            Visible: =Not(IsBlank(gCurrentEmployee.ID)) && Not(IsBlank(gCurrentUser.ID))
            Width: =Parent.Width
            Y: =188
      - galRequests:
          Control: Gallery@2.15.0
          Variant: BrowseLayout_Vertical_TwoTextOneImageVariant_ver5.0
          Properties:
            BorderColor: =RGBA(210, 209, 199, 1)
            Height: =Parent.Height - 188
            Items: |-
              =SortByColumns(
                  Filter(
                      Switch(gCurrentUser.Role.Value,
                          "Manager", Filter('RM Procurement Requests',
                              ManagerApproverID.Id = gCurrentEmployee.ID ||
                              RequesterEmail = User().Email
                          ),
                          "Procurement", Filter('RM Procurement Requests',
                              Status.Value = "Pending Procurement" ||
                              Status.Value = "Pending Invoice" ||
                              Status.Value = "Pending Accounting" ||
                              Status.Value = "Goods Receipt & Acceptance" ||
                              Status.Value = "Pending Supplier Follow-up" ||
                              Status.Value = "Completed" ||
                              Status.Value = "Rejected" ||
                              RequesterEmail = User().Email
                          ),
                          "Accounting", Filter('RM Procurement Requests',
                              Status.Value = "Pending Accounting" ||
                              Status.Value = "Goods Receipt & Acceptance" ||
                              Status.Value = "Pending Supplier Follow-up" ||
                              Status.Value = "Completed" ||
                              RequesterEmail = User().Email
                          ),
                          "Executive", 'RM Procurement Requests',
                          "Admin", 'RM Procurement Requests',
                          Filter('RM Procurement Requests',
                              RequesterEmail = User().Email ||
                              GRAssignedToID.Id = gCurrentEmployee.ID ||
                              SFU1AssignedToID.Id = gCurrentEmployee.ID
                          )
                      ),
                      IsBlank(gStatusFilter) || Status.Value = gStatusFilter
                  ),
                  "ID", SortOrder.Descending
              )
            OnSelect: =Set(gSelectedRequest, ThisItem); If(ThisItem.Status.Value = "Pending Invoice" && (gCurrentUser.Role.Value = "Procurement" || gCurrentUser.Role.Value = "Admin"), Navigate(InvoiceSubmissionScreen), Navigate(RequestDetailScreen))
            TemplateSize: =96
            Visible: =Not(IsBlank(gCurrentEmployee.ID)) && Not(IsBlank(gCurrentUser.ID))
            Width: =Parent.Width
            Y: =188
          Children:
            - rectRowHitArea:
                Control: Rectangle@2.3.0
                Properties:
                  Fill: =RGBA(0, 0, 0, 0)
                  Height: =96
                  HoverFill: =RGBA(245, 245, 250, 1)
                  OnSelect: =Set(gSelectedRequest, ThisItem); If(ThisItem.Status.Value = "Pending Invoice" && (gCurrentUser.Role.Value = "Procurement" || gCurrentUser.Role.Value = "Admin"), Navigate(InvoiceSubmissionScreen), Navigate(RequestDetailScreen))
                  Width: =Parent.Width
            - rowRequestContent:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  DropShadow: =DropShadow.None
                  Height: =96
                  LayoutDirection: =LayoutDirection.Vertical
                  LayoutGap: =4
                  PaddingBottom: =10
                  PaddingLeft: =16
                  PaddingRight: =16
                  PaddingTop: =10
                  RadiusBottomLeft: =0
                  RadiusBottomRight: =0
                  RadiusTopLeft: =0
                  RadiusTopRight: =0
                  Width: =Parent.Width
                Children:
                  - rowTop:
                      Control: GroupContainer@1.5.0
                      Variant: AutoLayout
                      Properties:
                        DropShadow: =DropShadow.None
                        FillPortions: =0
                        Height: =28
                        LayoutAlignItems: =LayoutAlignItems.Center
                        LayoutDirection: =LayoutDirection.Horizontal
                        RadiusBottomLeft: =0
                        RadiusBottomRight: =0
                        RadiusTopLeft: =0
                        RadiusTopRight: =0
                        Width: =Parent.Width
                      Children:
                        - lblRequestTitle:
                            Control: Label@2.5.1
                            Properties:
                              FontWeight: =FontWeight.Semibold
                              Height: =28
                              Text: =ThisItem.Title
                              Width: =Parent.Width - 500
                        - rowTopRight:
                            Control: GroupContainer@1.5.0
                            Variant: AutoLayout
                            Properties:
                              DropShadow: =DropShadow.None
                              Height: =28
                              LayoutAlignItems: =LayoutAlignItems.Center
                              LayoutDirection: =LayoutDirection.Horizontal
                              LayoutGap: =10
                              LayoutJustifyContent: =LayoutJustifyContent.End
                              LayoutMinHeight: =28
                              RadiusBottomLeft: =0
                              RadiusBottomRight: =0
                              RadiusTopLeft: =0
                              RadiusTopRight: =0
                              Width: =500
                            Children:
                              - rowInvoiceActions:
                                  Control: GroupContainer@1.5.0
                                  Variant: AutoLayout
                                  Properties:
                                    DropShadow: =DropShadow.None
                                    Height: =24
                                    LayoutAlignItems: =LayoutAlignItems.Center
                                    LayoutDirection: =LayoutDirection.Horizontal
                                    LayoutGap: =10
                                    LayoutJustifyContent: =LayoutJustifyContent.End
                                    LayoutMinHeight: =28
                                    RadiusBottomLeft: =0
                                    RadiusBottomRight: =0
                                    RadiusTopLeft: =0
                                    RadiusTopRight: =0
                                  Children:
                                    - btnSubmitInvoice:
                                        Control: Button@0.0.45
                                        Properties:
                                          BasePaletteColor: =RGBA(133, 79, 11, 1)
                                          FontWeight: =FontWeight.Semibold
                                          Height: =24
                                          OnSelect: =Set(gSelectedRequest, ThisItem); Navigate(RequesterInvoiceScreen)
                                          Text: ="Submit Invoice"
                                          Visible: |-
                                            =ThisItem.InvoiceMode.Value = "ViaRequester" && !ThisItem.InvoiceSubmitted &&
                                            (
                                              gCurrentUser.Role.Value <> "Procurement" && gCurrentUser.Role.Value <> "Admin" ||
                                              ThisItem.RequesterEmail = gCurrentEmployee.Email
                                            )
                                          Width: =160
                                    - btnProcessInvoice:
                                        Control: Button@0.0.45
                                        Properties:
                                          BasePaletteColor: |-
                                            =If(
                                              ThisItem.InvoiceMode.Value = "Deferred",
                                              RGBA(83, 74, 183, 1),
                                              If(IsBlank(ThisItem.RequesterInvoiceURL), RGBA(133, 79, 11, 1), RGBA(83, 74, 183, 1))
                                            )
                                          FontWeight: =FontWeight.Semibold
                                          Height: =24
                                          OnSelect: =Set(gSelectedRequest, ThisItem); Navigate(InvoiceSubmissionScreen)
                                          Text: |-
                                            =If(
                                              ThisItem.InvoiceMode.Value = "Deferred",
                                              "Submit Invoice",
                                              If(IsBlank(ThisItem.RequesterInvoiceURL), "Remind Requester", "Process Invoice")
                                            )
                                          Visible: |-
                                            =(ThisItem.InvoiceMode.Value = "ViaRequester" || ThisItem.InvoiceMode.Value = "Deferred") &&
                                            !ThisItem.InvoiceSubmitted &&
                                            (gCurrentUser.Role.Value = "Procurement" || gCurrentUser.Role.Value = "Admin")
                                          Width: =160
                              - lblRequestStatus:
                                  Control: Label@2.5.1
                                  Properties:
                                    Align: =Align.Center
                                    Color: |-
                                      =Switch(ThisItem.Status.Value,
                                        "Completed", RGBA(15, 110, 86, 1),
                                        "Rejected", RGBA(163, 45, 45, 1),
                                        "Goods Receipt & Acceptance", RGBA(83, 74, 183, 1),
                                        "Pending Manager", RGBA(133, 79, 11, 1),
                                        "Pending Executive", RGBA(133, 79, 11, 1),
                                        "Pending Procurement", RGBA(133, 79, 11, 1),
                                        "Pending Accounting", RGBA(133, 79, 11, 1),
                                        "Pending Invoice", RGBA(133, 79, 11, 1),
                                        RGBA(68, 68, 65, 1)
                                      )
                                    Fill: |-
                                      =Switch(ThisItem.Status.Value,
                                        "Completed", RGBA(225, 245, 238, 1),
                                        "Rejected", RGBA(252, 235, 235, 1),
                                        "Goods Receipt & Acceptance", RGBA(225, 220, 252, 1),
                                        "Pending Manager", RGBA(250, 238, 218, 1),
                                        "Pending Executive", RGBA(250, 238, 218, 1),
                                        "Pending Procurement", RGBA(250, 238, 218, 1),
                                        "Pending Accounting", RGBA(250, 238, 218, 1),
                                        "Pending Invoice", RGBA(250, 238, 218, 1),
                                        RGBA(241, 239, 232, 1)
                                      )
                                    FontWeight: =FontWeight.Semibold
                                    Height: =28
                                    Size: =11
                                    Text: |-
                                      =If(
                                        ThisItem.Status.Value = "Pending Supplier Follow-up",
                                        If(
                                          IsBlank(LookUp('RM Procurement Execution Log', RequestIDText = Text(ThisItem.ID) And StepNumber = 4)),
                                          "Supplier Follow-up (Step 1)",
                                          "Supplier Follow-up (Step 2)"
                                        ),
                                        ThisItem.Status.Value
                                      )
                                    Width: =220
                              - btnViewRequest:
                                  Control: Button@0.0.45
                                  Properties:
                                    FontWeight: =FontWeight.Semibold
                                    Height: =24
                                    OnSelect: =Set(gSelectedRequest, ThisItem); If(ThisItem.Status.Value = "Pending Invoice" && (gCurrentUser.Role.Value = "Procurement" || gCurrentUser.Role.Value = "Admin"), Navigate(InvoiceSubmissionScreen), Navigate(RequestDetailScreen))
                                    Text: ="View"
                                    Width: =70
                  - rowMeta:
                      Control: GroupContainer@1.5.0
                      Variant: AutoLayout
                      Properties:
                        DropShadow: =DropShadow.None
                        FillPortions: =0
                        Height: =22
                        LayoutDirection: =LayoutDirection.Horizontal
                        LayoutJustifyContent: =LayoutJustifyContent.SpaceBetween
                        RadiusBottomLeft: =0
                        RadiusBottomRight: =0
                        RadiusTopLeft: =0
                        RadiusTopRight: =0
                        Width: =Parent.Width
                      Children:
                        - lblRequestMeta:
                            Control: Label@2.5.1
                            Properties:
                              Color: =RGBA(136, 135, 128, 1)
                              Height: =22
                              Size: =11
                              Text: |-
                                ="ID: " & ThisItem.ID & " | Delivery Date: " & Text(ThisItem.RequiredDeliveryDate, "dd/mm/yyyy") & If(IsBlank(ThisItem.EstimatedCost) || ThisItem.EstimatedCost = 0, "", " | Estimated Cost: " & ThisItem.Currency & " " & Text(ThisItem.EstimatedCost, "[#,###]")) & If(IsBlank(ThisItem.ProjectID), "", " | ProjectID: " & ThisItem.ProjectID)
                              Width: =Parent.Width - 440
                        - lblRequesterName:
                            Control: Label@2.5.1
                            Properties:
                              Align: =Align.Right
                              Color: =RGBA(136, 135, 128, 1)
                              Height: =22
                              Size: =11
                              Text: |-
                                =ThisItem.RequesterID.Value &
                                If(
                                  ThisItem.Status.Value = "Goods Receipt & Acceptance" && Not(IsBlank(ThisItem.GRAssignedToID)),
                                  " | Receiver: " & ThisItem.GRAssignedToID.Value,
                                  If(
                                    ThisItem.Status.Value = "Pending Supplier Follow-up" && Not(IsBlank(ThisItem.SFU1AssignedToID)) && IsBlank(LookUp('RM Procurement Execution Log', RequestIDText = Text(ThisItem.ID) && StepNumber = 4)),
                                    " | Receiver: " & ThisItem.SFU1AssignedToID.Value,
                                    ""
                                  )
                                )
                              Visible: =Not(ThisItem.InvoiceMode.Value = "ViaRequester" && !ThisItem.InvoiceSubmitted)
                              Width: =420
                  - lblRequestMaterials:
                      Control: Label@2.5.1
                      Properties:
                        Color: =RGBA(136, 135, 128, 1)
                        Height: =18
                        Size: =9
                        Text: |-
                          =With(
                            {wMaterials: Concat(Filter('RM Procurement Line Items', RequestIDText = Text(ThisItem.ID)), MaterialName, ", ")},
                            If(IsBlank(wMaterials), "", "Raw Materials: " & If(Len(wMaterials) > 100, Left(wMaterials, 100) & "...", wMaterials))
                          )
                        Width: =Parent.Width - 32
                        Wrap: =false
            - rectSeparator:
                Control: Rectangle@2.3.0
                Properties:
                  Fill: =RGBA(210, 209, 199, 1)
                  Height: =1
                  Width: =Parent.Width
                  Y: =95
