Screens:
  SupplierFollowUpScreen:
    Properties:
      LoadingSpinnerColor: =RGBA(56, 96, 178, 1)
      OnVisible: |-
        =Set(gSFU1LogEntry, Blank());
        Set(gSFU1PendingAttachments, Blank());
        NewForm(frmSFU1Log_SFU);
        Set(gSelectedRequest, LookUp('RM Procurement Requests', ID = gSelectedRequest.ID));
        ClearCollect(colLineItemsDetail, Filter('RM Procurement Line Items', RequestIDText = Text(gSelectedRequest.ID)));
        UpdateIf(colLineItemsDetail, IsBlank(RMPKCode2), {RMPKCode2: LookUp('Raw Materials', ID = MaterialID.Id).Code});
        Set(gSFU1DelegationMode, If(IsBlank(gSelectedRequest.SFU1AssignedToID) || gSelectedRequest.SFU1AssignedToID.Id = 0 || gSelectedRequest.SFU1AssignedToID.Id = gCurrentEmployee.ID, "I will receive", "Assign to someone else"));
        Set(locCreditNoteURL_SFU, "");
        Set(gPendingCreditNoteName_SFU, "")
    Children:
      - rectHeader_SFU:
          Control: Rectangle@2.3.0
          Properties:
            Fill: =RGBA(83, 74, 183, 1)
            Height: =60
            Width: =Parent.Width
      - lblScreenTitle_SFU:
          Control: Label@2.5.1
          Properties:
            Color: =RGBA(255, 255, 255, 1)
            FontWeight: =FontWeight.Bold
            Height: =60
            Size: =14
            Text: ="Raw Material Procurement - Supplier Follow-up"
            Width: =600
            X: =20
      - rowInfoBlock_SFU:
          Control: GroupContainer@1.5.0
          Variant: AutoLayout
          Properties:
            DropShadow: =DropShadow.None
            Fill: =RGBA(245, 245, 250, 1)
            Height: =120
            LayoutDirection: =LayoutDirection.Vertical
            LayoutGap: =4
            PaddingBottom: =12
            PaddingLeft: =20
            PaddingRight: =20
            PaddingTop: =12
            RadiusBottomLeft: =0
            RadiusBottomRight: =0
            RadiusTopLeft: =0
            RadiusTopRight: =0
            Width: =Parent.Width
            Y: =60
          Children:
