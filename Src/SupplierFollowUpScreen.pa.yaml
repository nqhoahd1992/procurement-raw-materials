                          =Set(locCreditNoteURL_SFU,
                              gSharePointAttachmentBase & Text(gSelectedRequest.ID) & "/" & EncodeUrl(gPendingCreditNoteName_SFU)
                          );
                          With(
                              {wPatched: Patch(
                                  'RM Procurement Requests',
