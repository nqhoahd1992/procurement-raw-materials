                  - btnSaveAssignment_SFU:
                      Control: Button@0.0.45
                      Properties:
                        Height: =36
                        OnSelect: |-
                          =If(
                            IsBlank(ddAssignReceiver_SFU.Selected.Title),
                            Notify("Please select a person to assign", NotificationType.Error),
                            If(
                              Not(IsBlank(gSelectedRequest.SFU1AssignedToID)) &&
                              gSelectedRequest.SFU1AssignedToID.Id <> ddAssignReceiver_SFU.Selected.ID,
                              Procurement_Notify_Receipt_Assignee.Run(
                                  LookUp('Employee List', ID = gSelectedRequest.SFU1AssignedToID.Id).email,
                                  gSelectedRequest.SFU1AssignedToID.Value,
                                  gSelectedRequest.Title,
                                  gSelectedRequest.ID,
                                  "Unassigned",
                                  Text(gSelectedRequest.RequiredDeliveryDate, "dd/mm/yyyy"),
                                  "",
                                  "Max Biocare · Raw Materials Procurement"
                              )
                            );
                            With(
                              {wPatched: Patch('RM Procurement Requests', LookUp('RM Procurement Requests', ID = gSelectedRequest.ID), {SFU1AssignedToID: {Id: ddAssignReceiver_SFU.Selected.ID, Value: ddAssignReceiver_SFU.Selected.Title}})},
                              If(
                                IsBlank(wPatched.ID),
                                Notify("Failed to save assignment. Please try again.", NotificationType.Error),
                                Set(gSelectedRequest, wPatched);
                                Procurement_Notify_Receipt_Assignee.Run(
                                  ddAssignReceiver_SFU.Selected.email,
                                  ddAssignReceiver_SFU.Selected.Title,
                                  gSelectedRequest.Title,
                                  gSelectedRequest.ID,
                                  "SupplierFollowUp",
                                  Text(gSelectedRequest.RequiredDeliveryDate, "dd/mm/yyyy"),
                                  "",
                                  "Max Biocare · Raw Materials Procurement"
                                );
                                Notify("Assignment saved to " & ddAssignReceiver_SFU.Selected.Title, NotificationType.Success)
                              )
                            )
                          )
                        Text: ="Save Assignment"
                        Visible: =gSFU1DelegationMode = "Assign to someone else"
                        Width: =160
                        X: =40
                        Y: =40
                  - btnSubmitStep1_SFU:
                      Control: Button@0.0.45
                      Properties:
                        Height: =36
                        OnSelect: |-
                          =With(
                              {wLatest: LookUp('RM Procurement Requests', ID = gSelectedRequest.ID)},
                              If(
                                  Not(
                                      wLatest.RequesterEmail = gCurrentEmployee.Email && IsBlank(wLatest.SFU1AssignedToID)
                                      || Not(IsBlank(wLatest.SFU1AssignedToID)) && wLatest.SFU1AssignedToID.Id = gCurrentEmployee.ID
                                  ),
                                  Notify("This assignment has been reassigned to someone else. Your submission has been cancelled.", NotificationType.Warning);
                                  Navigate(HomeScreen),
                                  If(
                                      Not(chkSFU1.Checked && chkSFU2.Checked && chkSFU3.Checked && chkSFU4.Checked && chkSFU5.Checked),
                                      Notify("Please complete all checklist items", NotificationType.Error),
                                      If(
                                          IsBlank(dpReceiptDate2_SFU.SelectedDate) ||
                                          IsBlank(ddReceiptStatus2_SFU.Selected.Value) ||
                                          IsBlank(ddAcceptanceDecision2_SFU.Selected) ||
                                          IsBlank(txtRemarks2_SFU.Value) ||
                                          CountRows(attSFU1Photos.Attachments) = 0,
                                          Notify("Please fill in all required fields", NotificationType.Error),
                                          If(
                                          CountRows(Filter(colLineItemsDetail, ReceivedQty2 > 0)) = 0,
                                          Notify("Please enter received quantity for at least one material", NotificationType.Error),
                                          If(
                                          CountRows(Filter(colLineItemsDetail, ReceivedQty2 > 0 && IsBlank(BatchNumber2))) > 0,
                                          Notify("Please enter batch number for all received materials", NotificationType.Error),
                                          If(
                                          CountRows(Filter(colLineItemsDetail, ReceivedQty2 > 0 && IsBlank(ExpiryDate2))) > 0,
                                          Notify("Please enter expiry date for all received materials", NotificationType.Error),
                                          If(
                                          CountRows(Filter(colLineItemsDetail, ReceivedQty2 > 0 && IsBlank(QCNumber2))) > 0,
                                          Notify("Please enter QC number for all received materials", NotificationType.Error),
                                          If(
                                          CountRows(Filter(colLineItemsDetail, ReceivedQty2 > 0 && IsBlank(RMPKCode2))) > 0,
                                          Notify("Please enter RM/PK code for all received materials", NotificationType.Error),
                                          If(
                                          CountRows(Filter(colLineItemsDetail, ReceivedQty2 > 0 && IsBlank(COALink2))) > 0,
                                          Notify("Please enter Link to COA for all received materials", NotificationType.Error),
                                          With(
                                              {
                                                  wPatched: Patch(
                                                      'RM Procurement Requests',
                                                      gSelectedRequest,
                                                      {
                                                          Status: {Value: If(
                                                              ddAcceptanceDecision2_SFU.Selected.Value = "Accepted",
                                                              If(!wLatest.InvoiceSubmitted, "Pending Invoice", "Pending Accounting"),
                                                              If(!wLatest.InvoiceSubmitted, "Pending Invoice", "Pending Supplier Follow-up")
                                                          )},
                                                          FollowUpReceiptBy: gCurrentEmployee.Title,
                                                          FollowUpReceiptDate: dpReceiptDate2_SFU.SelectedDate,
                                                          FollowUpReceiptStatus: {Value: ddReceiptStatus2_SFU.Selected.Value},
                                                          FollowUpAcceptanceDecision: {Value: ddAcceptanceDecision2_SFU.Selected.Value},
                                                          Fulfillment: {Value: If(
                                                              ddAcceptanceDecision2_SFU.Selected.Value = "Accepted with Adjustment",
                                                              "Fulfilled with Adjustment",
                                                              "Fulfilled"
                                                          )},
                                                          FollowUpRemarks: txtRemarks2_SFU.Value,
                                                          FollowUpReceiptAt: Now()
                                                      }
                                                  )
                                              },
                                              If(
                                                  IsBlank(wPatched.ID),
                                                  Notify("Failed to submit. Please try again.", NotificationType.Error),
                                                  With(
                                                      {wLog: Patch(
                                                          'RM Procurement Execution Log',
                                                          Defaults('RM Procurement Execution Log'),
                                                          {
                                                              Title: "Step 4 - Supplier Follow-up Requester - " & gSelectedRequest.Title,
                                                              RequestID: {Id: gSelectedRequest.ID, Value: gSelectedRequest.Title},
                                                              RequestIDText: Text(gSelectedRequest.ID),
                                                              StepNumber: 4,
                                                              StepName: {Value: "Supplier Follow-up — Requester Detail"},
                                                              ExecutedBy: {Id: gCurrentEmployee.ID, Value: gCurrentEmployee.Title},
                                                              ExecutedAt: Now()
                                                          }
                                                      )},
                                                      If(
                                                          IsBlank(wLog.ID),
                                                          Notify("Failed to save execution log. Please try again.", NotificationType.Error),
                                                          Set(gSFU1PendingAttachments, attSFU1Photos.Attachments);
                                                          Set(gSFU1LogEntry, wLog);
                                                          EditForm(frmSFU1Log_SFU);
                                                          SubmitForm(frmSFU1Log_SFU);
                                                          ForAll(
                                                              colLineItemsDetail,
                                                              Patch(
                                                                  'RM Procurement Line Items',
                                                                  {ID: ThisRecord.ID},
                                                                  {
                                                                      ReceivedQty2: ThisRecord.ReceivedQty2,
                                                                      BatchNumber2: If(ThisRecord.ReceivedQty2 > 0, ThisRecord.BatchNumber2, ""),
                                                                      ExpiryDate2: If(ThisRecord.ReceivedQty2 > 0, ThisRecord.ExpiryDate2, Blank()),
                                                                      QCNumber2: If(ThisRecord.ReceivedQty2 > 0, ThisRecord.QCNumber2, ""),
                                                                      RMPKCode2: If(ThisRecord.ReceivedQty2 > 0, ThisRecord.RMPKCode2, ""),
                                                                      COALink2: If(ThisRecord.ReceivedQty2 > 0, ThisRecord.COALink2, "")
                                                                  }
                                                              )
                                                          );
                                                          Switch(
                                                              ddAcceptanceDecision2_SFU.Selected.Value,
                                                              "Accepted", Notify("Submitted. Request is now " & If(!wLatest.InvoiceSubmitted, "Pending Invoice.", "Pending Accounting."), NotificationType.Success),
                                                              "Accepted with Adjustment", Notify("Submitted. Request is now " & If(!wLatest.InvoiceSubmitted, "Pending Invoice.", "Pending Supplier Follow-up."), NotificationType.Success)
                                                          );
                                                          Refresh('RM Procurement Requests');
                                                          Navigate(HomeScreen)
                                                      )
                                                  )
                                              )
                                          )
                                          )
                                          )
                                          )
                                          )
                                          )
                                          )
                                      )
                                  )
                              )
                          )
                        Text: ="Submit →"
                        Visible: |-
                          =IsBlank(LookUp('RM Procurement Execution Log', RequestIDText = Text(gSelectedRequest.ID) && StepNumber = 4))
                          && gSFU1DelegationMode = "I will receive"
                        Width: =160
                        X: =40
                        Y: =40
                  - btnSubmitStep2_SFU:
                      Control: Button@0.0.45
                      Properties:
                        Height: =44
                        OnSelect: |-
                          =If(
                              IsBlank(txtFollowUpNotes_SFU.Value),
                              Notify("Supplier Follow-up Notes is required", NotificationType.Error),
                              If(
                                  gSelectedRequest.FollowUpAcceptanceDecision.Value = "Accepted with Adjustment",
                                  If(
                                      CountRows(attCreditNote_SFU.Attachments) = 0,
                                      Notify("Credit Note file is required for Invoice Adjustment", NotificationType.Error),
                                      Set(gPendingCreditNoteName_SFU, Last(attCreditNote_SFU.Attachments).Name);
                                      SubmitForm(formCreditNote_SFU)
                                  ),
                                  With(
                                      {wPatched: Patch(
                                          'RM Procurement Requests',
                                          gSelectedRequest,
                                          {
                                              Status: {Value: If(!gSelectedRequest.InvoiceSubmitted, "Pending Invoice", "Pending Accounting")},
                                              CreditNote: "",
                                              SupplierFollowUpNotes: txtFollowUpNotes_SFU.Value,
                                              FollowUpCompletedAt: Now()
                                          }
                                      )},
                                      If(
                                          IsBlank(wPatched.ID),
                                          Notify("Failed to submit. Please try again.", NotificationType.Error),
                                          With(
                                              {wLog: Patch(
                                                  'RM Procurement Execution Log',
                                                  Defaults('RM Procurement Execution Log'),
                                                  {
                                                      Title: "Step 5 - Supplier Follow-up Procurement - " & gSelectedRequest.Title,
                                                      RequestID: {Id: gSelectedRequest.ID, Value: gSelectedRequest.Title},
                                                      RequestIDText: Text(gSelectedRequest.ID),
                                                      StepNumber: 5,
                                                      StepName: {Value: "Supplier Follow-up — Procurement"},
                                                      ExecutedBy: {Id: gCurrentEmployee.ID, Value: gCurrentEmployee.Title},
                                                      ExecutedAt: Now()
                                                  }
                                              )},
                                              If(
                                                  IsBlank(wLog.ID),
                                                  Notify("Failed to save execution log. Please try again.", NotificationType.Error),
                                                  Refresh('RM Procurement Requests');
                                                  Notify("Follow-up completed. Request is now " & If(!gSelectedRequest.InvoiceSubmitted, "Pending Invoice.", "Pending Accounting."), NotificationType.Success);
                                                  Navigate(HomeScreen)
                                              )
                                          )
                                      )
                                  )
                              )
                          )
                        Text: ="Complete Follow-up →"
                        Visible: |-
                          =Not(IsBlank(LookUp('RM Procurement Execution Log', RequestIDText = Text(gSelectedRequest.ID) && StepNumber = 4))) &&
                            IsBlank(LookUp('RM Procurement Execution Log', RequestIDText = Text(gSelectedRequest.ID) && StepNumber = 5)) &&
                            (gCurrentUser.Role.Value = "Procurement" || gCurrentUser.Role.Value = "Admin")
                        Width: =200
                        X: =40
                        Y: =40
      - lblUserInfo_SFU:
          Control: Label@2.5.1
          Properties:
            Align: =Align.Right
            Color: =RGBA(255, 255, 255, 1)
            FontWeight: =FontWeight.Semibold
