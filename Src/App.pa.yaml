App:
  Properties:
    OnStart: |-
      =Set(gAppReady, false);
      Set(gCurrentEmployee, LookUp('Employee List', Email = User().Email));
      Set(gCurrentUser, LookUp('RM User', EmployeeID.Id = gCurrentEmployee.ID));
      Set(gUserRole, gCurrentUser.Role.Value);
      Set(gShowRejectReason, false);
      Set(gParsingInvoice, false);
      Set(gHasInvoiceResult, false);
      Set(gSelectedRequest, Blank());
      Set(gIsSpecialRole,
          gCurrentUser.Role.Value = "Manager" ||
          gCurrentUser.Role.Value = "Executive" ||
          gCurrentUser.Role.Value = "Procurement" ||
          gCurrentUser.Role.Value = "Accounting" ||
          gCurrentUser.Role.Value = "Admin"
      );
      Set(gGRLogEntry, Blank());
      Set(gGRPendingAttachments, Blank());
      Set(gSFU1LogEntry, Blank());
      Set(gSFU1PendingAttachments, Blank());
      Set(gGRDelegationMode, "I will receive");
      Set(gSFU1DelegationMode, "I will receive");
      Set(gSharePointAttachmentBase, "https://maxbiocare.sharepoint.com/sites/Powerapps/Lists/Raw_Material_Procurement_Requests/Attachments/");
      ClearCollect(colRawMaterials, FirstN('Raw Materials', 1));
      ClearCollect(colLineItems, {RowID: 0, MaterialID: 0, MaterialName: "", Unit: "", Quantity: 1});
      Clear(colLineItems);
      ClearCollect(colLineItemsDetail, {ID: 0, MaterialName: "", Unit: "", Quantity: 0, ReceivedQty1: 0, BatchNumber1: "", ExpiryDate1: Today(), ReceivedQty2: 0, BatchNumber2: "", ExpiryDate2: Today()});
      Clear(colLineItemsDetail);
      Set(gAppReady, true)
    Theme: =PowerAppsTheme
