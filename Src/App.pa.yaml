App:
  Properties:
    OnStart: |-
      =Set(gAppReady, false);
      Set(gCurrentEmployee, LookUp('Employee List', Email = User().Email));
      Set(gCurrentUser,
          If(
              IsBlank(LookUp(Procurement_User, EmployeeID.Id = gCurrentEmployee.ID)),
              {Role: {Value: "Requester"}},
              LookUp(Procurement_User, EmployeeID.Id = gCurrentEmployee.ID)
          )
      );
      Set(gUserRole, gCurrentUser.Role.Value);
      Set(gShowRejectReason, false);
      Set(gParsingInvoice, false);
      Set(gHasInvoiceResult, false);
      Set(gSelectedRequest, Blank());
      Set(gIsSpecialRole,
          gCurrentUser.Role.Value = "Manager" ||
          gCurrentUser.Role.Value = "Executive" ||
          gCurrentUser.Role.Value = "Procurement" ||
          gCurrentUser.Role.Value = "Accounting" ||
          gCurrentUser.Role.Value = "Admin"
      );
      Set(gGRLogEntry, Blank());
      Set(gGRPendingAttachments, Blank());
      Set(gSFU1LogEntry, Blank());
      Set(gSFU1PendingAttachments, Blank());
      Set(gGRDelegationMode, "I will receive");
      Set(gSFU1DelegationMode, "I will receive");
      Set(gSharePointAttachmentBase, "https://maxbiocare.sharepoint.com/sites/Powerapps/Lists/Procurement_Requests/Attachments/");
      Set(gAppReady, true)
    Theme: =PowerAppsTheme
